  function AddCasePage({ onBack, isExisting, user, onProfile }) {
    const { C } = useTheme();
    const { t } = useLang();
    const [borrowerCases, setBorrowerCases] = useState([]);
    const blank = () => ({
      name: '', father_name: '', address: '', mobile: '', items: '', weight: '', metal: 'Gold',
      money_lent: '', interest_rate: '',
      loan_date: isExisting ? '' : todayStr(),
      loan_time: isExisting ? '' : nowTime(),
      notes: '',
      probable_close_date: '', hard_deadline: '',
      address_proof: '', lending_video: '',
    });
    const [form, setForm]       = useState(blank());
    const [loading, setLoading] = useState(false);
    const [success, setSuccess] = useState(null);
    const [error, setError]     = useState('');
    const set  = k => e => { setForm(f => ({ ...f, [k]: e.target.value })); setError(''); };
    const setF = k => v  => { setForm(f => ({ ...f, [k]: v })); };          // for file fields
    const submit = async e => {
      e.preventDefault();
      if (!form.name.trim()) { setError('Borrower name is required.'); return; }
      setLoading(true); setError('');
      try {
        const res = await api.post('/api/cases', form);
        setSuccess(res.id); setForm(blank());
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { setError(err.message || 'Failed to save.'); }
      finally { setLoading(false); }
    };
    const g2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 };
    const g3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 };

    // Hard-deadline overdue warning
    const hdPast = form.hard_deadline && new Date(form.hard_deadline) < new Date();

    return (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s', display: 'flex', flexDirection: 'column' }}>
        <Navbar title={isExisting ? 'Add Existing Case' : 'Add New Case'} onBack={onBack} user={user} onProfile={onProfile} />
        <div className="fade-in" style={{ padding: '28px 20px', maxWidth: 800, margin: '0 auto', width: '100%', flex: 1 }}>
          {isExisting && <div style={{ marginBottom: 16 }}><Alert type="info">📂 Entering an existing record — fill in the original loan date &amp; time manually.</Alert></div>}
          {success && (
            <div style={{ marginBottom: 16 }}>
              <Alert type="success">✅ Case <strong>#{success}</strong> saved!{' '}
                <span style={{ textDecoration: 'underline', cursor: 'pointer' }} onClick={() => setSuccess(null)}>Add another →</span>
              </Alert>
            </div>
          )}
          <Card>
            <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>

              {/* ── Borrower Details ─────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('borrowerDetails')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('borrowerName')} required value={form.name} onChange={set('name')} placeholder="Full name" autoFocus />
                    <Input label={t('fatherName')} value={form.father_name} onChange={set('father_name')} placeholder="Father's full name" />
                  </div>
                  <div style={g2}>
                    <Input label={t('mobileNumber')} type="tel" value={form.mobile}
                      onChange={e => {
                        const v = e.target.value;
                        setForm(f => ({ ...f, mobile: v })); setError('');
                        if (v && v.length >= 10) {
                          api.get(`/api/borrowers/${encodeURIComponent(v)}/cases`).then(setBorrowerCases).catch(() => setBorrowerCases([]));
                        } else { setBorrowerCases([]); }
                      }}
                      placeholder="e.g. 9876543210" />
                    <div />
                  </div>
                  <Textarea label={t('address')} value={form.address} onChange={set('address')} rows={2} placeholder="Full address..." />
                  <FileUpload
                    label={`${t('addressProof')} (Aadhaar / PAN / Passport)`}
                    accept="image/*"
                    value={form.address_proof}
                    onChange={setF('address_proof')}
                  />
                </div>
              </div>

              {/* ── Pledged Item ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('pledgedItem')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <Input label={t('items')} value={form.items} onChange={set('items')} placeholder="e.g. Gold necklace, 2 bangles, silver anklets" />
                  <div style={g3}>
                    <Input label={t('weight')} type="number" step="0.01" min="0" value={form.weight} onChange={set('weight')} placeholder="e.g. 10.5" />
                    <div style={{ gridColumn: 'span 2' }}>
                      <Select label={t('metalType')} value={form.metal} onChange={set('metal')}>
                        {METALS.map(m => <option key={m} value={m}>{m}</option>)}
                      </Select>
                    </div>
                  </div>
                </div>
              </div>

              {/* Existing-borrower hint */}
              {borrowerCases.length > 0 && (
                <div style={{
                  background: C.infoBg, border: `1px solid ${C.infoBorder}`, color: C.infoColor,
                  borderRadius: 10, padding: '10px 14px', fontSize: 13,
                }}>
                  ℹ️ <strong>{borrowerCases[0].name}</strong> has borrowed <strong>{borrowerCases.length}</strong> time{borrowerCases.length === 1 ? '' : 's'} before.
                  Total lent: ₹{borrowerCases.reduce((s, c) => s + (c.money_lent || 0), 0).toLocaleString('en-IN')}.
                  ({borrowerCases.filter(c => c.status === 'open').length} open · {borrowerCases.filter(c => c.status === 'closed').length} closed · {borrowerCases.filter(c => c.status === 'bad_debt').length} bad debt)
                </div>
              )}

              {/* ── Loan Details ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('loanDetails')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('amountLent')} type="number" step="0.01" min="0" value={form.money_lent} onChange={set('money_lent')} placeholder="e.g. 50000" />
                    <Input label={t('interestRate')} type="number" step="0.01" min="0" value={form.interest_rate} onChange={set('interest_rate')} placeholder="e.g. 2" />
                  </div>
                  <div style={g2}>
                    <Input label={isExisting ? 'Original Loan Date' : 'Date'} type="date" value={form.loan_date} onChange={set('loan_date')} required={isExisting} />
                    <Input label={isExisting ? 'Original Loan Time' : 'Time'} type="time" value={form.loan_time} onChange={set('loan_time')} />
                  </div>
                  <div style={g2}>
                    <Input label={t('probableClose')} type="month" value={form.probable_close_date} onChange={set('probable_close_date')} />
                    <div>
                      <Input
                        label={t('hardDeadline')}
                        type="date"
                        value={form.hard_deadline}
                        onChange={set('hard_deadline')}
                        style={hdPast ? { borderColor: C.error } : {}}
                      />
                      {hdPast && <div style={{ fontSize: 11, color: C.error, marginTop: 4 }}>⚠️ This date is already past!</div>}
                    </div>
                  </div>
                  <Textarea label={t('notes')} value={form.notes} onChange={set('notes')} rows={3} placeholder="Any additional notes..." />
                </div>
              </div>

              {/* ── Lending Proof ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('lendingProofVid')}</SectionTitle>
                <FileUpload
                  label="Upload video of borrower receiving the loan (optional)"
                  accept="video/*"
                  value={form.lending_video}
                  onChange={setF('lending_video')}
                  maxMB={25}
                />
              </div>

              {error && <Alert type="error">{error}</Alert>}
              <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-end', paddingTop: 4 }}>
                <Btn type="button" variant="secondary" onClick={onBack}>{t('cancel')}</Btn>
                <Btn type="submit" loading={loading}>💾 {t('saveCase')}</Btn>
              </div>
            </form>
          </Card>
        </div>
        <Footer />
      </div>
    );
  }

  function CaseDetailModal({ caseId, caseBasic, onClose, onClosed }) {
    const { C } = useTheme();
    // Start with basic list data, then upgrade to full (with files) asynchronously
    const [c, setC]               = useState(caseBasic);
    const [loadingFull, setLF]    = useState(true);
    const [amtReceived,    setAmtReceived]    = useState('');
    const [closingVideo,   setClosingVideo]   = useState('');
    const [closing,        setClosing]        = useState(false);
    const [closeErr,       setCloseErr]       = useState('');
    const [done,           setDone]           = useState(false);
    const [confirmBD,      setConfirmBD]      = useState(false);
    const [markingBD,      setMarkingBD]      = useState(false);
    const [bdErr,          setBdErr]          = useState('');
    const [bdDone,         setBdDone]         = useState(false);

    // ─── Edit / History / Delete state ───
    const [editing,        setEditing]        = useState(false);
    const [editForm,       setEditForm]       = useState({});
    const [editErr,        setEditErr]        = useState('');
    const [savingEdit,     setSavingEdit]     = useState(false);
    const [confirmEdit,    setConfirmEdit]    = useState(false);
    const [editDone,       setEditDone]       = useState(false);
    const [historyOpen,    setHistoryOpen]    = useState(false);
    const [history,        setHistory]        = useState(null);
    const [loadingHistory, setLoadingHistory] = useState(false);
    const [confirmDelete,  setConfirmDelete]  = useState(false);
    const [deleting,       setDeleting]       = useState(false);
    const [delErr,         setDelErr]         = useState('');

    // 5d Renew / 5e Partial payments
    const [renewOpen, setRenewOpen]   = useState(false);
    const [renewForm, setRenewForm]   = useState({ extend_months: 3, capitalise_interest: false });
    const [renewBusy, setRenewBusy]   = useState(false);
    const [renewErr,  setRenewErr]    = useState('');
    const [partials,  setPartials]    = useState([]);
    const [partialOpen, setPartialOpen] = useState(false);
    const [partialForm, setPartialForm] = useState({ amount: '', method: 'UPI', note: '' });
    const [partialBusy, setPartialBusy] = useState(false);
    const [partialErr,  setPartialErr]  = useState('');

    useEffect(() => {
      api.get(`/api/cases/${caseId}`)
        .then(full => { setC(full); setLF(false); })
        .catch(() => setLF(false));
      api.get(`/api/cases/${caseId}/partial-payments`)
        .then(setPartials).catch(() => {});
    }, [caseId]);

    const doRenew = async () => {
      setRenewBusy(true); setRenewErr('');
      try {
        await api.post(`/api/cases/${c.id}/renew`, {
          extend_months: parseInt(renewForm.extend_months) || 0,
          capitalise_interest: !!renewForm.capitalise_interest,
        });
        const full = await api.get(`/api/cases/${c.id}`);
        setC(full); setRenewOpen(false); onClosed?.();
      } catch (e) { setRenewErr(e.message || 'Could not renew'); }
      finally { setRenewBusy(false); }
    };

    const doPartial = async () => {
      setPartialBusy(true); setPartialErr('');
      try {
        await api.post(`/api/cases/${c.id}/partial-payment`, {
          amount: parseFloat(partialForm.amount), method: partialForm.method, note: partialForm.note,
        });
        const list = await api.get(`/api/cases/${c.id}/partial-payments`);
        setPartials(list);
        setPartialForm({ amount: '', method: 'UPI', note: '' });
        setPartialOpen(false);
        onClosed?.();
      } catch (e) { setPartialErr(e.message || 'Could not record payment'); }
      finally { setPartialBusy(false); }
    };

    const downloadReceipt = (kind) => {
      const url = `/api/cases/${c.id}/receipt?type=${kind}`;
      window.open(url, '_blank');
    };

    const startEdit = () => {
      setEditForm({
        name: c.name || '', father_name: c.father_name || '',
        address: c.address || '', mobile: c.mobile || '',
        items: c.items || '', weight: c.weight ?? '', metal: c.metal || 'Gold',
        money_lent: c.money_lent ?? '', interest_rate: c.interest_rate ?? '',
        loan_date: c.loan_date || '', loan_time: c.loan_time || '',
        notes: c.notes || '',
        probable_close_date: c.probable_close_date || '',
        hard_deadline: c.hard_deadline || '',
      });
      setEditing(true); setEditErr(''); setConfirmEdit(false);
    };
    const ef = k => e => setEditForm(f => ({ ...f, [k]: e.target.value }));

    const doSaveEdit = async () => {
      setSavingEdit(true); setEditErr('');
      try {
        const r = await api.req(`/api/cases/${c.id}`, { method: 'PATCH', body: JSON.stringify(editForm) });
        if (r.changed) {
          // Optimistically merge edits and refetch full from server
          const full = await api.get(`/api/cases/${c.id}`);
          setC(full); setEditDone(true);
          // Force a fresh history fetch next time it opens
          setHistory(null);
          onClosed?.();
          setTimeout(() => { setEditing(false); setConfirmEdit(false); setEditDone(false); }, 1200);
        } else {
          setEditing(false); setConfirmEdit(false);
        }
      } catch (e) { setEditErr(e.message || 'Could not save changes.'); }
      finally { setSavingEdit(false); }
    };

    const toggleHistory = async () => {
      const next = !historyOpen;
      setHistoryOpen(next);
      if (next && history === null) {
        setLoadingHistory(true);
        try { setHistory(await api.get(`/api/cases/${c.id}/history`)); }
        catch { setHistory([]); }
        finally { setLoadingHistory(false); }
      }
    };

    const doDelete = async () => {
      setDeleting(true); setDelErr('');
      try {
        await api.req(`/api/cases/${c.id}`, { method: 'DELETE' });
        onClosed?.();
        onClose();
      } catch (e) { setDelErr(e.message || 'Could not delete.'); }
      finally { setDeleting(false); }
    };

    const isOpen    = c.status === 'open';
    const isClosed  = c.status === 'closed';
    const isBadDebt = c.status === 'bad_debt';
    const canClose  = isOpen || isBadDebt;
    const calc      = calcInterest(c, isClosed ? c.closed_at : null);
    const fmtI      = v => `₹${Math.round(v).toLocaleString('en-IN')}`;

    // Hard deadline overdue check
    const hdDate   = c.hard_deadline ? new Date(c.hard_deadline) : null;
    const hdPast   = hdDate && hdDate < new Date() && !isClosed;

    const doClose = async () => {
      if (amtReceived === '') { setCloseErr('Please enter the amount received.'); return; }
      setClosing(true); setCloseErr('');
      try {
        await api.post(`/api/cases/${c.id}/close`, {
          amount_received: parseFloat(amtReceived),
          closing_video:   closingVideo || null,
        });
        setDone(true); onClosed(); setTimeout(onClose, 1800);
      } catch (e) { setCloseErr(e.message || 'Failed.'); }
      finally { setClosing(false); }
    };
    const doBadDebt = async () => {
      setMarkingBD(true); setBdErr('');
      try {
        await api.post(`/api/cases/${c.id}/bad-debt`, {});
        setBdDone(true); onClosed(); setTimeout(onClose, 1800);
      } catch (e) { setBdErr(e.message || 'Failed.'); }
      finally { setMarkingBD(false); }
    };

    const SecHd = ({ children }) => (
      <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>{children}</div>
    );

    return (
      <div onClick={e => e.target === e.currentTarget && onClose()} style={{
        position: 'fixed', inset: 0, background: C.modalOverlay, zIndex: 300,
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
        backdropFilter: 'blur(2px)',
      }}>
        <div className="fade-in" style={{
          background: C.card, borderRadius: 20, width: '100%', maxWidth: 600,
          maxHeight: '92vh', overflowY: 'auto',
          boxShadow: '0 28px 64px rgba(0,0,0,0.45)',
          border: `1px solid ${C.border}`,
          transition: 'background-color 0.3s',
        }}>
          {/* Header */}
          <div style={{
            padding: '18px 24px', borderBottom: `1px solid ${C.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            position: 'sticky', top: 0, background: C.card, zIndex: 1, borderRadius: '20px 20px 0 0',
            transition: 'background-color 0.3s',
          }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontWeight: 800, fontSize: 18, color: C.text }}>Case #{c.id}</span>
                <StatusBadge status={c.status} />
                {loadingFull && <span style={{ fontSize: 11, color: C.faint }}>loading…</span>}
              </div>
              <div style={{ fontSize: 13.5, color: C.muted, marginTop: 3 }}>{c.name}</div>
            </div>
            <button onClick={onClose} style={{
              background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8,
              width: 34, height: 34, cursor: 'pointer', fontSize: 15, color: C.muted,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>✕</button>
          </div>

          <div style={{ padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Overdue hard-deadline banner */}
            {hdPast && (
              <Alert type="error">
                🚨 <strong>Hard Deadline Passed!</strong> Deadline was {c.hard_deadline}.
                Metal can be melted / asset confiscated per terms.
              </Alert>
            )}

            {/* Borrower Details */}
            <div>
              <SecHd>Borrower Details</SecHd>
              <InfoRow label="Name"          value={c.name} />
              {c.father_name && <InfoRow label="Father's Name" value={c.father_name} />}
              {c.mobile      && <InfoRow label="Mobile"        value={c.mobile} />}
              {c.address     && <InfoRow label="Address"       value={c.address} />}
              {/* Address Proof Image */}
              {c.address_proof && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>Address Proof</div>
                  <img src={c.address_proof} alt="address proof"
                    style={{ width: '100%', maxHeight: 200, objectFit: 'cover', borderRadius: 8, border: `1px solid ${C.border}` }} />
                </div>
              )}
            </div>

            {/* Pledged Item */}
            {(c.items || c.weight || c.metal) && (
              <div>
                <SecHd>Pledged Item</SecHd>
                {c.items  && <InfoRow label="Description" value={c.items} />}
                {c.weight && <InfoRow label="Weight"      value={`${c.weight}g`} />}
                {c.metal  && <InfoRow label="Metal"       value={c.metal} />}
              </div>
            )}

            {/* Loan Details */}
            <div>
              <SecHd>Loan Details</SecHd>
              <InfoRow label="Loan Date"     value={c.loan_date || '—'} />
              {c.loan_time          && <InfoRow label="Loan Time"           value={c.loan_time} />}
              <InfoRow label="Amount Lent"   value={fmt(c.money_lent, '₹')} />
              <InfoRow label="Interest Rate" value={c.interest_rate ? `${c.interest_rate}% / month` : '—'} />
              {c.probable_close_date && (
                <InfoRow label="Probable Close"
                  value={new Date(c.probable_close_date + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })} />
              )}
              {c.hard_deadline && (
                <InfoRow label="Hard Deadline"
                  value={
                    <span style={{ color: hdPast ? C.error : C.text, fontWeight: hdPast ? 700 : 500 }}>
                      {c.hard_deadline}{hdPast ? ' ⚠️ OVERDUE' : ''}
                    </span>
                  } />
              )}
              {c.notes              && <InfoRow label="Notes"               value={c.notes} />}
            </div>

            {/* Lending proof video */}
            {c.lending_video && (
              <div>
                <SecHd>Lending Proof Video</SecHd>
                <video src={c.lending_video} controls style={{ width: '100%', borderRadius: 10, border: `1px solid ${C.border}` }} />
              </div>
            )}

            {/* Interest calculation */}
            {calc && (
              <div style={{ background: C.primaryLight, borderRadius: 14, padding: '18px 20px', border: `1px solid ${C.primary}25` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.primary, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 14 }}>
                  Interest Calculation
                  <span style={{ fontWeight: 400, fontSize: 11, marginLeft: 8, opacity: 0.7 }}>
                    ({isClosed ? `closed ${c.closed_at ? c.closed_at.slice(0,10) : ''}` : 'as of today'})
                  </span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Principal Amount</span>
                    <span style={{ fontWeight: 600, color: C.text }}>{fmtI(calc.principal)}</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Months @ {c.interest_rate}%
                      <span style={{ fontSize: 11, marginLeft: 5, opacity: 0.65 }}>(incomplete = full)</span>
                    </span>
                    <span style={{ fontWeight: 600, color: C.text }}>{calc.months} mo</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Interest Amount</span>
                    <span style={{ fontWeight: 600, color: C.text }}>{fmtI(calc.interest)}</span>
                  </div>
                  <div style={{ borderTop: `2px solid ${C.primary}35`, paddingTop: 12, marginTop: 2, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>Total (Principal + Interest)</span>
                    <span style={{ fontWeight: 800, fontSize: 22, color: C.primary }}>{fmtI(calc.total)}</span>
                  </div>
                </div>
              </div>
            )}

            {/* Close case section */}
            {canClose && !done && !bdDone && (
              <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 18 }}>
                <SecHd>Close This Case</SecHd>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <Input
                    label="Amount Received (₹)" type="number" step="0.01" min="0"
                    value={amtReceived}
                    onChange={e => { setAmtReceived(e.target.value); setCloseErr(''); }}
                    placeholder={calc ? `Total due: ₹${Math.round(calc.total).toLocaleString('en-IN')}` : 'Enter amount received'}
                  />
                  <FileUpload
                    label="Closing Proof Video (borrower collecting item — optional)"
                    accept="video/*"
                    value={closingVideo}
                    onChange={setClosingVideo}
                    maxMB={25}
                  />
                  {closeErr && <Alert type="error">{closeErr}</Alert>}
                  <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                    <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
                    <Btn variant="danger" onClick={doClose} loading={closing}>🔒 Close Case</Btn>
                  </div>
                </div>
                {isOpen && (
                  <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px dashed ${C.border}` }}>
                    {!confirmBD ? (
                      <button onClick={() => setConfirmBD(true)} style={{
                        background: 'none', border: 'none', color: C.amber,
                        cursor: 'pointer', fontSize: 13, fontWeight: 600, padding: 0,
                      }}>⚠️ Mark as Bad Debt</button>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <Alert type="warning">⚠️ Marking as bad debt means you don't expect this loan to be recovered. Are you sure?</Alert>
                        {bdErr && <Alert type="error">{bdErr}</Alert>}
                        <div style={{ display: 'flex', gap: 8 }}>
                          <Btn variant="ghost" onClick={() => setConfirmBD(false)}>Cancel</Btn>
                          <Btn variant="warning" onClick={doBadDebt} loading={markingBD}>Confirm Bad Debt</Btn>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {done   && <Alert type="success">✅ Case #{c.id} closed successfully!</Alert>}
            {bdDone && <Alert type="warning">⚠️ Case #{c.id} marked as bad debt.</Alert>}

            {/* Closure summary */}
            {isClosed && (
              <div style={{ background: C.errorLight, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.errorBorder}` }}>
                <SecHd>Closure Summary</SecHd>
                <InfoRow label="Closed At"       value={c.closed_at || '—'} />
                <InfoRow label="Amount Received" value={fmt(c.amount_received, '₹')} />
                {calc && c.amount_received != null && (() => {
                  const diff = parseFloat(c.amount_received) - Math.round(calc.total);
                  return <InfoRow label={diff >= 0 ? 'Surplus' : 'Pending Balance'}
                    value={`₹${Math.abs(diff).toLocaleString('en-IN')} ${diff >= 0 ? '(surplus)' : '(pending)'}`} />;
                })()}
                {c.closing_video && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>Closing Proof Video</div>
                    <video src={c.closing_video} controls style={{ width: '100%', borderRadius: 8, border: `1px solid ${C.errorBorder}` }} />
                  </div>
                )}
              </div>
            )}

            {isBadDebt && !bdDone && (
              <div style={{ background: C.amberLight, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.amberBorder}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.amber, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Bad Debt Notice</div>
                <p style={{ fontSize: 13, color: C.muted }}>This case is written off as bad debt. You can still close it if payment is later received.</p>
                {calc && <p style={{ fontSize: 13, color: C.muted, marginTop: 6, fontWeight: 600 }}>Outstanding today: ₹{Math.round(calc.total).toLocaleString('en-IN')}</p>}
              </div>
            )}

            {/* ─── Edit form (overlay, replaces sections when active) ─── */}
            {editing && (
              <div style={{
                background: C.primaryLight, borderRadius: 14, padding: '20px 20px',
                border: `1px solid ${C.primary}40`,
              }}>
                <SecHd>Edit Case</SecHd>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                    <Input label="Name" required value={editForm.name} onChange={ef('name')} />
                    <Input label="Father's Name" value={editForm.father_name} onChange={ef('father_name')} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                    <Input label="Mobile" type="tel" value={editForm.mobile} onChange={ef('mobile')} />
                    <Input label="Items" value={editForm.items} onChange={ef('items')} />
                  </div>
                  <Textarea label="Address" rows={2} value={editForm.address} onChange={ef('address')} />
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                    <Input label="Weight (g)" type="number" step="0.01" value={editForm.weight} onChange={ef('weight')} />
                    <Select label="Metal" value={editForm.metal} onChange={ef('metal')}>
                      {METALS.map(m => <option key={m} value={m}>{m}</option>)}
                    </Select>
                    <Input label="Interest Rate (%/mo)" type="number" step="0.01" value={editForm.interest_rate} onChange={ef('interest_rate')} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                    <Input label="Amount Lent (₹)" type="number" step="0.01" value={editForm.money_lent} onChange={ef('money_lent')} />
                    <Input label="Loan Date" type="date" value={editForm.loan_date} onChange={ef('loan_date')} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                    <Input label="Loan Time" type="time" value={editForm.loan_time} onChange={ef('loan_time')} />
                    <Input label="Probable Close" type="month" value={editForm.probable_close_date} onChange={ef('probable_close_date')} />
                    <Input label="Hard Deadline" type="date" value={editForm.hard_deadline} onChange={ef('hard_deadline')} />
                  </div>
                  <Textarea label="Notes" rows={2} value={editForm.notes} onChange={ef('notes')} />
                  {editErr && <Alert type="error">{editErr}</Alert>}
                  {editDone && <Alert type="success">✓ Changes saved.</Alert>}
                  {!confirmEdit ? (
                    <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                      <Btn type="button" variant="secondary" onClick={() => { setEditing(false); setEditErr(''); }}>Cancel</Btn>
                      <Btn type="button" onClick={() => setConfirmEdit(true)} loading={savingEdit}>Save Changes</Btn>
                    </div>
                  ) : (
                    <div style={{ background: C.amberLight, border: `1px solid ${C.amberBorder}`, borderRadius: 10, padding: '12px 14px' }}>
                      <div style={{ fontSize: 13, color: C.amber, fontWeight: 600, marginBottom: 10 }}>
                        ⚠️ Confirm Save — these edits will be logged in this case's history. Proceed?
                      </div>
                      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                        <Btn type="button" variant="ghost" onClick={() => setConfirmEdit(false)}>Cancel</Btn>
                        <Btn type="button" variant="warning" onClick={doSaveEdit} loading={savingEdit}>Yes, save</Btn>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ─── Partial payments list ─── */}
            {partials.length > 0 && (
              <div>
                <SecHd>Partial Payments</SecHd>
                <div style={{ background: C.successLight, border: `1px solid ${C.successBorder}`, borderRadius: 10, padding: '10px 14px' }}>
                  {partials.map(p => (
                    <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '4px 0', color: C.text }}>
                      <span>{(p.paid_at || p.created_at || '').slice(0, 16).replace('T',' ')} · {p.method || 'cash'}</span>
                      <strong style={{ color: C.success }}>₹{Number(p.amount).toLocaleString('en-IN')}</strong>
                    </div>
                  ))}
                  <div style={{ borderTop: `1px dashed ${C.successBorder}`, marginTop: 6, paddingTop: 6, display: 'flex', justifyContent: 'space-between', fontSize: 13, fontWeight: 700, color: C.success }}>
                    <span>Total paid so far</span>
                    <span>₹{partials.reduce((s, p) => s + Number(p.amount || 0), 0).toLocaleString('en-IN')}</span>
                  </div>
                </div>
              </div>
            )}

            {/* ─── Top-level action row ─── */}
            {!editing && !done && !bdDone && (
              <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', paddingTop: 4, borderTop: `1px solid ${C.border}`, marginTop: 4, flexWrap: 'wrap' }}>
                <Btn variant="ghost" onClick={() => downloadReceipt('lending')} style={{ padding: '8px 14px', fontSize: 12 }}>📄 Lending Receipt</Btn>
                {isClosed && <Btn variant="ghost" onClick={() => downloadReceipt('closure')} style={{ padding: '8px 14px', fontSize: 12 }}>📄 Closure Receipt</Btn>}
                {isOpen && <Btn variant="ghost" onClick={() => setPartialOpen(o => !o)} style={{ padding: '8px 14px', fontSize: 12 }}>💰 Partial Payment</Btn>}
                {isOpen && <Btn variant="ghost" onClick={() => setRenewOpen(o => !o)} style={{ padding: '8px 14px', fontSize: 12 }}>🔄 Renew</Btn>}
                <Btn variant="secondary" onClick={startEdit} style={{ padding: '8px 16px' }}>✏️ Edit</Btn>
              </div>
            )}

            {/* Partial payment form */}
            {partialOpen && isOpen && (
              <div style={{ background: C.successLight, borderRadius: 12, padding: 16, border: `1px solid ${C.successBorder}`, display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ fontWeight: 700, color: C.success }}>Record Partial Payment</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  <Input label="Amount (₹)" type="number" step="0.01" value={partialForm.amount} onChange={e => setPartialForm(f => ({ ...f, amount: e.target.value }))} />
                  <Select label="Method" value={partialForm.method} onChange={e => setPartialForm(f => ({ ...f, method: e.target.value }))}>
                    <option value="UPI">UPI</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Cheque">Cheque</option>
                  </Select>
                </div>
                <Input label="Note (optional)" value={partialForm.note} onChange={e => setPartialForm(f => ({ ...f, note: e.target.value }))} />
                {partialErr && <Alert type="error">{partialErr}</Alert>}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                  <Btn variant="ghost" onClick={() => setPartialOpen(false)}>Cancel</Btn>
                  <Btn onClick={doPartial} loading={partialBusy}>Record Payment</Btn>
                </div>
              </div>
            )}

            {/* Renew loan form */}
            {renewOpen && isOpen && (
              <div style={{ background: C.amberLight, borderRadius: 12, padding: 16, border: `1px solid ${C.amberBorder}`, display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ fontWeight: 700, color: C.amber }}>Renew / Extend Loan</div>
                <Input label="Extend by (months)" type="number" min="1" value={renewForm.extend_months} onChange={e => setRenewForm(f => ({ ...f, extend_months: e.target.value }))} />
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: C.text }}>
                  <input type="checkbox" checked={renewForm.capitalise_interest} onChange={e => setRenewForm(f => ({ ...f, capitalise_interest: e.target.checked }))} />
                  Capitalise accrued interest into principal (resets loan date to today)
                </label>
                {renewErr && <Alert type="error">{renewErr}</Alert>}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                  <Btn variant="ghost" onClick={() => setRenewOpen(false)}>Cancel</Btn>
                  <Btn variant="warning" onClick={doRenew} loading={renewBusy}>Confirm Renewal</Btn>
                </div>
              </div>
            )}

            {/* ─── Collapsible View History ─── */}
            <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden' }}>
              <button onClick={toggleHistory} style={{
                width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                background: 'transparent', border: 'none', cursor: 'pointer',
                padding: '12px 16px', color: C.text, fontSize: 13.5, fontWeight: 700,
              }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  📜 View History
                  {history && <span style={{ background: C.primaryLight, color: C.primary, padding: '1px 8px', borderRadius: 10, fontSize: 11, fontWeight: 700 }}>{history.length}</span>}
                </span>
                <span style={{ fontSize: 14, color: C.muted, transition: 'transform 0.2s', transform: historyOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}>▾</span>
              </button>
              {historyOpen && (
                <div style={{ borderTop: `1px solid ${C.border}`, padding: '12px 16px', background: C.cardAlt }}>
                  {loadingHistory && <div style={{ color: C.faint, fontSize: 12.5, padding: '6px 0' }}>Loading…</div>}
                  {!loadingHistory && history && history.length === 0 && (
                    <div style={{ color: C.faint, fontSize: 12.5, padding: '6px 0' }}>No history yet.</div>
                  )}
                  {!loadingHistory && history && history.length > 0 && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                      {history.map(h => {
                        const actionColors = {
                          created: C.success, updated: C.primary,
                          closed: C.error, marked_bad_debt: C.amber,
                          deleted: C.error,
                        };
                        const col = actionColors[h.action] || C.muted;
                        let parsedChanges = null;
                        try { parsedChanges = h.changes ? JSON.parse(h.changes) : null; } catch {}
                        return (
                          <div key={h.id} style={{ padding: '10px 12px', background: C.card, borderRadius: 8, border: `1px solid ${C.border}` }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginBottom: 6 }}>
                              <span style={{ background: col + '22', color: col, fontSize: 11, fontWeight: 800, padding: '2px 9px', borderRadius: 12, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                {h.action.replace('_', ' ')}
                              </span>
                              <span style={{ fontSize: 11, color: C.faint }}>
                                {h.actor_name || 'system'} · {(h.created_at || '').toString().slice(0,16).replace('T', ' ')}
                              </span>
                            </div>
                            {parsedChanges && h.action === 'updated' && (
                              <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.7 }}>
                                {Object.entries(parsedChanges).map(([k, v]) => (
                                  <div key={k} style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                    <strong style={{ color: C.text, minWidth: 110 }}>{k.replace(/_/g, ' ')}:</strong>
                                    <span style={{ textDecoration: 'line-through', opacity: 0.65 }}>{v.old ?? '—'}</span>
                                    <span style={{ color: C.text }}>→</span>
                                    <span style={{ color: C.success, fontWeight: 600 }}>{v.new ?? '—'}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                            {parsedChanges && h.action !== 'updated' && (
                              <div style={{ fontSize: 12, color: C.muted }}>
                                {Object.entries(parsedChanges).map(([k, v]) => (
                                  <span key={k} style={{ marginRight: 10 }}><strong style={{ color: C.text }}>{k.replace(/_/g, ' ')}:</strong> {String(v)}</span>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ─── Danger zone ─── */}
            {!editing && !done && (
              <div style={{ borderTop: `1px solid ${C.errorBorder}`, paddingTop: 16 }}>
                <SecHd>Danger Zone</SecHd>
                {!confirmDelete ? (
                  <Btn variant="danger" onClick={() => { setConfirmDelete(true); setDelErr(''); }}>🗑 Delete Case</Btn>
                ) : (
                  <div style={{ background: C.errorLight, border: `1px solid ${C.errorBorder}`, borderRadius: 10, padding: '14px 16px' }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: C.error, marginBottom: 6 }}>
                      ⚠️ Permanent deletion
                    </div>
                    <p style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6, marginBottom: 12 }}>
                      Case #{c.id} and its entire history will be permanently removed. This cannot be undone.
                      An audit-log entry of the deletion will be retained.
                    </p>
                    {delErr && <Alert type="error">{delErr}</Alert>}
                    <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 8 }}>
                      <Btn variant="ghost" onClick={() => setConfirmDelete(false)}>Cancel</Btn>
                      <Btn variant="danger" onClick={doDelete} loading={deleting}>Yes, delete permanently</Btn>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </div>
    );
  }

  function ViewCasesPage({ onBack, user, onProfile }) {
    const { C, dark } = useTheme();
    const [cases, setCases]           = useState([]);
    const [loading, setLoading]       = useState(true);
    const [error, setError]           = useState('');
    const [selectedCase, setSelected] = useState(null);
    const [filters, setFilters]       = useState({ q:'', metal:'', from:'', to:'', amt_min:'', amt_max:'', amt_exact:'', status:'' });
    const setF = k => e => setFilters(f => ({ ...f, [k]: e.target.value }));

    const loadCases = useCallback(async f => {
      setLoading(true); setError('');
      try {
        const p = new URLSearchParams();
        if (f.q)         p.set('q',         f.q);
        if (f.metal)     p.set('metal',     f.metal);
        if (f.from)      p.set('from',      f.from);
        if (f.to)        p.set('to',        f.to);
        if (f.amt_exact) p.set('amt_exact', f.amt_exact);
        else {
          if (f.amt_min) p.set('amt_min', f.amt_min);
          if (f.amt_max) p.set('amt_max', f.amt_max);
        }
        if (f.status) p.set('status', f.status);
        const data = await api.get('/api/cases?' + p);
        setCases(Array.isArray(data) ? data : []);
      } catch (err) { setError(err.message || 'Failed to load.'); }
      finally { setLoading(false); }
    }, []);

    useEffect(() => { loadCases(filters); }, []);

    const clearFilters = () => {
      const c = { q:'', metal:'', from:'', to:'', amt_min:'', amt_max:'', amt_exact:'', status:'' };
      setFilters(c); loadCases(c);
    };

    const filterCard = {
      background: C.card, borderRadius: 14, padding: '20px 22px',
      border: `1px solid ${C.border}`,
      boxShadow: `0 2px 8px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,
      marginBottom: 18, transition: 'background-color 0.3s',
    };

    return (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s', display: 'flex', flexDirection: 'column' }}>
        <Navbar title="All Cases" onBack={onBack} user={user} onProfile={onProfile} />
        {selectedCase && (
          <CaseDetailModal
            caseId={selectedCase.id}
            caseBasic={selectedCase}
            onClose={() => setSelected(null)}
            onClosed={() => loadCases(filters)}
          />
        )}
        <div className="fade-in" style={{ padding: '28px 20px', maxWidth: 1200, margin: '0 auto' }}>

          {/* Filters */}
          <div style={filterCard}>
            <div style={{ fontWeight: 700, fontSize: 13, color: C.muted, marginBottom: 14, letterSpacing: '0.04em' }}>🔍 SEARCH &amp; FILTER</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(155px, 1fr))', gap: 12 }}>
              <Input label="Search" value={filters.q} onChange={setF('q')} placeholder="Name, items, ID…" onKeyDown={e => e.key === 'Enter' && loadCases(filters)} />
              <Select label="Metal" value={filters.metal} onChange={setF('metal')}>
                <option value="">All Metals</option>
                {METALS.map(m => <option key={m} value={m}>{m}</option>)}
              </Select>
              <Select label="Status" value={filters.status} onChange={setF('status')}>
                <option value="">All Status</option>
                <option value="open">Open</option>
                <option value="closed">Closed</option>
                <option value="bad_debt">Bad Debt</option>
              </Select>
              <Input label="Date From" type="date" value={filters.from} onChange={setF('from')} />
              <Input label="Date To"   type="date" value={filters.to}   onChange={setF('to')}   />
              <Input label="Exact Amount (₹)" type="number" value={filters.amt_exact} onChange={setF('amt_exact')} placeholder="e.g. 50000" />
              <Input label="Min Amount (₹)" type="number" value={filters.amt_min} onChange={setF('amt_min')} placeholder="10000"
                style={{ opacity: filters.amt_exact ? 0.4 : 1 }} disabled={!!filters.amt_exact} />
              <Input label="Max Amount (₹)" type="number" value={filters.amt_max} onChange={setF('amt_max')} placeholder="100000"
                style={{ opacity: filters.amt_exact ? 0.4 : 1 }} disabled={!!filters.amt_exact} />
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 14 }}>
              <Btn variant="secondary" onClick={clearFilters}>Clear</Btn>
              <Btn onClick={() => loadCases(filters)}>Search</Btn>
            </div>
          </div>

          {/* Results */}
          <div style={{
            background: C.card, borderRadius: 14,
            border: `1px solid ${C.border}`,
            boxShadow: `0 2px 8px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,
            overflow: 'hidden', transition: 'background-color 0.3s',
          }}>
            <div style={{
              padding: '14px 20px', borderBottom: `1px solid ${C.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              background: C.cardAlt, transition: 'background-color 0.3s',
            }}>
              <span style={{ fontWeight: 700, fontSize: 14, color: C.text }}>
                {loading ? 'Loading…' : `${cases.length} record${cases.length !== 1 ? 's' : ''} found`}
              </span>
              <span style={{ fontSize: 12, color: C.faint }}>Click a row to view / close / bad-debt</span>
            </div>
            {error && <div style={{ padding: 20 }}><Alert type="error">{error}</Alert></div>}
            {loading ? (
              <div style={{ padding: 60, textAlign: 'center', color: C.faint }}><div style={{ fontSize: 30, marginBottom: 12 }}>⏳</div>Loading records…</div>
            ) : cases.length === 0 ? (
              <div style={{ padding: 60, textAlign: 'center', color: C.faint }}><div style={{ fontSize: 36, marginBottom: 12 }}>📭</div>No records found.</div>
            ) : (
              <div className="tbl-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>#</th><th>Status</th><th>Borrower</th><th>Mobile</th><th>Father's Name</th>
                      <th>Items</th><th>Metal</th><th>Weight</th>
                      <th>Amount Lent</th><th>Rate</th><th>Date</th><th>Deadline</th><th>Notes</th>
                    </tr>
                  </thead>
                  <tbody>
                    {cases.map(c => {
                      const dlPast = c.hard_deadline && new Date(c.hard_deadline) < new Date() && c.status === 'open';
                      return (
                      <tr key={c.id} onClick={() => setSelected(c)} style={{ opacity: c.status === 'bad_debt' ? 0.72 : 1 }}>
                        <td><span style={{ fontWeight: 700, color: C.primary, fontSize: 13 }}>#{c.id}</span></td>
                        <td><StatusBadge status={c.status} /></td>
                        <td style={{ fontWeight: 600, whiteSpace: 'nowrap' }}>{c.name}</td>
                        <td style={{ whiteSpace: 'nowrap' }}>{c.mobile || '—'}</td>
                        <td style={{ whiteSpace: 'nowrap' }}>{c.father_name || '—'}</td>
                        <td style={{ maxWidth: 180, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={c.items}>{c.items || '—'}</td>
                        <td>{c.metal ? <span style={{ padding:'2px 10px', borderRadius:20, fontSize:12, fontWeight:600, background:C.primaryLight, color:C.primary }}>{c.metal}</span> : '—'}</td>
                        <td>{c.weight != null ? `${c.weight}g` : '—'}</td>
                        <td style={{ fontWeight: 600, whiteSpace: 'nowrap' }}>{fmt(c.money_lent, '₹')}</td>
                        <td>{c.interest_rate != null ? `${c.interest_rate}%/mo` : '—'}</td>
                        <td style={{ whiteSpace: 'nowrap' }}>{c.loan_date || '—'}</td>
                        <td style={{ whiteSpace: 'nowrap', color: dlPast ? C.error : 'inherit', fontWeight: dlPast ? 700 : 400 }}>
                          {c.hard_deadline ? (dlPast ? `⚠️ ${c.hard_deadline}` : c.hard_deadline) : '—'}
                        </td>
                        <td style={{ maxWidth: 140, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }} title={c.notes}>{c.notes || '—'}</td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
        <Footer />
      </div>
    );
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────

  function DashboardPage({ onBack, user, onProfile }) {
    const { C, dark } = useTheme();
    const [data, setData]       = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError]     = useState('');

    useEffect(() => {
      api.get('/api/dashboard')
        .then(d => { setData(d); setLoading(false); })
        .catch(e => { setError(e.message); setLoading(false); });
    }, []);

    const spinnerPage = msg => (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s', display: 'flex', flexDirection: 'column' }}>
        <Navbar title="Dashboard & Analytics" onBack={onBack} user={user} onProfile={onProfile} />
        <div style={{ padding: 60, textAlign: 'center', color: C.faint, flex: 1 }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>📊</div>
          <div>{msg}</div>
        </div>
        <Footer />
      </div>
    );

    if (loading) return spinnerPage('Crunching numbers…');
    if (error)   return (
      <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', flexDirection: 'column' }}>
        <Navbar title="Dashboard & Analytics" onBack={onBack} user={user} onProfile={onProfile} />
        <div style={{ padding: 40, flex: 1 }}><Alert type="error">{error}</Alert></div>
        <Footer />
      </div>
    );
    if (data.total_cases === 0) return spinnerPage('No cases yet. Add your first case to see analytics.');

    const d = data;
    const mLabels = d.monthly_trend.map(r => fmtMonth(r.month));
    const g = (min, mb = 16) => ({ display: 'grid', gridTemplateColumns: `repeat(auto-fit, minmax(${min}px, 1fr))`, gap: mb, marginBottom: mb });
    const secHead = label => (
      <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>{label}</div>
    );

    return (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s', display: 'flex', flexDirection: 'column' }}>
        <Navbar title="Dashboard & Analytics" onBack={onBack} user={user} onProfile={onProfile} />
        <div className="fade-in" style={{ padding: '28px 20px', maxWidth: 1200, margin: '0 auto', width: '100%', flex: 1 }}>

          {secHead('💰 Portfolio Overview')}
          <div style={g(180)}>
            <KpiCard label="Total Principal Lent"   value={fmtCompact(d.total_principal)}          icon="💰" color={C.primary} />
            <KpiCard label="Interest Generated"     value={fmtCompact(d.total_interest_generated)} icon="📈" color={C.success} sub="on all closed cases" />
            <KpiCard label="Total Received"         value={fmtCompact(d.total_amount_received)}    icon="💵" color={C.green} />
            <KpiCard label="Outstanding Receivable" value={fmtCompact(d.outstanding_receivable)}   icon="⏳" color={C.amber} sub="principal + accrued on open cases" />
            <KpiCard label="Projected Interest"     value={fmtCompact(d.projected_interest)}       icon="🔮" color={C.cyan}  sub="if all open cases closed today" />
            <KpiCard label="Bad Debt Amount"        value={fmtCompact(d.bad_debt_amount)}          icon="⚠️" color={C.error} sub={`${d.bad_debt_cases} case${d.bad_debt_cases !== 1 ? 's' : ''}`} />
          </div>

          <div style={g(160)}>
            <KpiCard label="Open Cases"            value={d.open_cases}                icon="📂" color={C.cyan} />
            <KpiCard label="Closed Cases"          value={d.closed_cases}              icon="✅" color={C.green} />
            <KpiCard label="Bad Debt Cases"        value={d.bad_debt_cases}            icon="🚫" color={C.error} />
            <KpiCard label="Recovery Rate"         value={`${d.recovery_rate}%`}       icon="🎯" color={C.success} sub="closed cases fully recovered" />
            <KpiCard label="Effective Yield"       value={`${d.effective_yield}%`}     icon="📊" color={C.primary} sub="interest / principal (closed)" />
            <KpiCard label="Collection Efficiency" value={`${d.collection_efficiency}%`} icon="⚡" color={C.violet} sub="received / (received + outstanding)" />
          </div>

          {/* Year bar + status donut */}
          <div style={g(300)}>
            <ChartBox title="💰 Money Lent by Year">
              {d.lending_by_year.length === 0
                ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No dated records</div>
                : <BarChart
                    labels={d.lending_by_year.map(r => r.year)}
                    datasets={[{ label: 'Amount Lent', data: d.lending_by_year.map(r => r.amount), backgroundColor: C.primary + 'CC', borderRadius: 6 }]}
                    yFmt={fmtAxis} height={240} />
              }
            </ChartBox>
            <ChartBox title="📊 Case Status Breakdown">
              <DoughnutChart
                labels={['Open', 'Closed', 'Bad Debt']}
                data={[d.open_cases, d.closed_cases, d.bad_debt_cases]}
                colors={[C.cyan, C.success, C.amber]} height={200}
              />
              <div style={{ display: 'flex', justifyContent: 'space-around', marginTop: 14 }}>
                {[['Open', d.open_cases, C.cyan], ['Closed', d.closed_cases, C.success], ['Bad Debt', d.bad_debt_cases, C.amber]].map(([l, v, col]) => (
                  <div key={l} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: col }}>{v}</div>
                    <div style={{ fontSize: 11, color: C.faint }}>{l}</div>
                  </div>
                ))}
              </div>
            </ChartBox>
          </div>

          {/* Monthly line + metal donut */}
          <div style={g(300)}>
            <ChartBox title="📅 Monthly Trend — Last 12 Months">
              <LineChart labels={mLabels}
                datasets={[
                  { label: 'Money Lent',      data: d.monthly_trend.map(r => r.lent),      borderColor: C.primary, backgroundColor: C.primary + '28', fill: true },
                  { label: 'Amount Received', data: d.monthly_trend.map(r => r.recovered), borderColor: C.success, backgroundColor: C.success + '28', fill: true },
                ]}
                yFmt={fmtAxis} height={240} />
            </ChartBox>
            <ChartBox title="🥇 Metal Distribution (by cases)">
              {d.metal_breakdown.length === 0
                ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No data</div>
                : <DoughnutChart labels={d.metal_breakdown.map(r => r.metal)} data={d.metal_breakdown.map(r => r.cases)} colors={CHART_PALETTE} height={240} />
              }
            </ChartBox>
          </div>

          {/* Age buckets + top borrowers */}
          <div style={g(280)}>
            <ChartBox title="⏱️ Open Case Age Distribution">
              <BarChart
                labels={['0–3 months', '3–6 months', '6–12 months', '12+ months']}
                datasets={[{ label: 'Cases', data: [d.case_age_buckets['0_3'], d.case_age_buckets['3_6'], d.case_age_buckets['6_12'], d.case_age_buckets['12_plus']],
                  backgroundColor: [C.success + 'CC', C.cyan + 'CC', C.amber + 'CC', C.error + 'CC'], borderRadius: 6 }]}
                height={220} />
            </ChartBox>
            <ChartBox title="👥 Top 5 Borrowers by Amount">
              {d.top_borrowers.length === 0
                ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No data</div>
                : <BarChart
                    labels={d.top_borrowers.map(r => r.name.length > 14 ? r.name.slice(0,14)+'…' : r.name)}
                    datasets={[{ label: 'Amount Lent', data: d.top_borrowers.map(r => r.total_lent),
                      backgroundColor: CHART_PALETTE.slice(0, d.top_borrowers.length).map(c => c + 'CC'), borderRadius: 6 }]}
                    yFmt={fmtAxis} height={220} />
              }
            </ChartBox>
          </div>

          {/* Monthly cases opened vs closed */}
          <ChartBox title="📆 Monthly Cases — Opened vs Closed (Last 12 Months)" style={{ marginBottom: 16 }}>
            <BarChart labels={mLabels}
              datasets={[
                { label: 'Cases Opened', data: d.monthly_trend.map(r => r.opened),       backgroundColor: C.primary + 'BB', borderRadius: 4 },
                { label: 'Cases Closed', data: d.monthly_trend.map(r => r.closed_count), backgroundColor: C.success + 'BB', borderRadius: 4 },
              ]}
              height={200} />
          </ChartBox>

          {/* Extra stats chips */}
          {secHead('📐 Additional Insights')}
          <div style={g(155)}>
            <StatChip label="Total Cases"       value={d.total_cases}                  color={C.primary} />
            <StatChip label="Avg Loan Amount"   value={fmtCompact(d.avg_loan_amount)}  color={C.cyan} />
            <StatChip label="Avg Duration"      value={`${d.avg_duration_days} days`}  sub="closed cases"    color={C.green} />
            <StatChip label="Avg Interest / Case" value={fmtCompact(d.avg_interest_per_case)} sub="closed cases" color={C.violet} />
            <StatChip label="Repeat Borrowers"  value={d.repeat_borrowers}             sub="same name, 2+ cases"   color={C.amber} />
            <StatChip label="Bad Debt Rate"     value={`${d.bad_debt_rate_cases}%`}    sub={`${d.bad_debt_rate_amount}% of ₹ lent`} color={C.error} />
            <StatChip label="Items Weight Held" value={d.total_weight_open > 0 ? `${d.total_weight_open}g` : '—'} sub="open cases"    color={C.amber} />
            <StatChip label="Avg Yield / Loan"
              value={d.avg_interest_per_case && d.avg_loan_amount
                ? `${((d.avg_interest_per_case / d.avg_loan_amount) * 100).toFixed(1)}%`
                : '—'}
              sub="avg interest / avg loan" color={C.cyan} />
          </div>

          {/* Notable + oldest */}
          <div style={g(280)}>
            <ChartBox title="🏆 Notable Cases">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {d.highest_case && (
                  <div style={{ background: C.successLight, borderRadius: 10, padding: '14px 16px', border: `1px solid ${C.successBorder}` }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.success, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>🏅 Highest Amount Case</div>
                    <div style={{ fontWeight: 800, fontSize: 18, color: C.text }}>₹{Number(d.highest_case.money_lent).toLocaleString('en-IN')}</div>
                    <div style={{ fontSize: 13, color: C.muted, marginTop: 3 }}>Case #{d.highest_case.id} — {d.highest_case.name}</div>
                    <div style={{ marginTop: 6 }}><StatusBadge status={d.highest_case.status} /></div>
                  </div>
                )}
                {d.lowest_case && (
                  <div style={{ background: C.primaryLight, borderRadius: 10, padding: '14px 16px', border: `1px solid ${C.primary}30` }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.primary, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>🎯 Lowest Amount Case</div>
                    <div style={{ fontWeight: 800, fontSize: 18, color: C.text }}>₹{Number(d.lowest_case.money_lent).toLocaleString('en-IN')}</div>
                    <div style={{ fontSize: 13, color: C.muted, marginTop: 3 }}>Case #{d.lowest_case.id} — {d.lowest_case.name}</div>
                    <div style={{ marginTop: 6 }}><StatusBadge status={d.lowest_case.status} /></div>
                  </div>
                )}
                {d.weight_by_metal && d.weight_by_metal.length > 0 && (
                  <div style={{ background: C.amberLight, borderRadius: 10, padding: '14px 16px', border: `1px solid ${C.amberBorder}` }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.amber, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>⚖️ Items Held (open cases)</div>
                    {d.weight_by_metal.map(r => (
                      <div key={r.metal} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: C.text, marginTop: 5 }}>
                        <span style={{ color: C.muted }}>{r.metal}</span>
                        <span style={{ fontWeight: 700 }}>{r.weight}g</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </ChartBox>

            <ChartBox title="🕰️ Oldest Open Cases">
              {d.oldest_open_cases.length === 0
                ? <div style={{ color: C.faint, textAlign: 'center', padding: 30 }}>No open cases</div>
                : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {d.oldest_open_cases.map((c, i) => (
                      <div key={c.id} style={{
                        background: i === 0 ? C.errorLight : C.bg,
                        borderRadius: 10, padding: '12px 14px',
                        border: `1px solid ${i === 0 ? C.errorBorder : C.border}`,
                        transition: 'background-color 0.3s',
                      }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                          <span style={{ fontWeight: 700, fontSize: 13, color: C.text }}>{c.name}</span>
                          <span style={{ fontSize: 11, color: i === 0 ? C.error : C.faint, fontWeight: 600 }}>{c.days_open}d old</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: C.muted }}>
                          <span>#{c.id} · {c.loan_date}</span>
                          <span style={{ fontWeight: 600, color: C.text }}>Due: ₹{Number(c.total_due).toLocaleString('en-IN')}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )
              }
            </ChartBox>
          </div>

        </div>
        <Footer />
      </div>
    );
  }

  // ── App root ───────────────────────────────────────────────────────────────

  function App() {
    const [me, setMe]     = useState(null);     // { authenticated, user, subscription }
    const [page, setPage] = useState('home');

    // Persist theme in localStorage
    const [dark, setDark] = useState(() => {
      try { return localStorage.getItem('loantrack-theme') === 'dark'; } catch { return false; }
    });
    const toggle = () => {
      setDark(d => {
        const next = !d;
        try { localStorage.setItem('loantrack-theme', next ? 'dark' : 'light'); } catch {}
        return next;
      });
    };
    useEffect(() => { document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); }, [dark]);
    useEffect(() => { document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); }, []);

    const refreshMe = useCallback(async () => {
      try {
        const d = await api.get('/api/auth/me');
        setMe(d);
      } catch { setMe({ authenticated: false }); }
    }, []);
    useEffect(() => { refreshMe(); }, [refreshMe]);

    const logout = async () => {
      await api.post('/api/auth/logout', {}).catch(() => {});
      setMe({ authenticated: false }); setPage('home');
    };

    // ⚠️ Rules of Hooks: declare ALL hooks before any early return.
    const [profileOpen, setProfileOpen] = useState(false);

    const isUser  = me?.user?.role === 'user';
    const sub     = me?.subscription;

    // Force expired tenants into the profile (which contains billing)
    useEffect(() => {
      if (isUser && sub && !sub.active) setProfileOpen(true);
    }, [isUser, sub]);

    const C = dark ? DARK : LIGHT;

    if (me === null) return (
      <div style={{ minHeight: '100vh', background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.faint }}>
        Loading…
      </div>
    );

    const auth = !!me.authenticated;
    const user = me.user;
    const isAdmin = user?.role === 'admin';
    const openProfile = () => setProfileOpen(true);

    return (
      <ThemeCtx.Provider value={{ C, dark, toggle }}>
        {!auth && <LandingPage onLogin={refreshMe} />}

        {auth && isAdmin && <AdminConsole user={user} onLogout={logout} />}

        {auth && isUser && (
          <>
            <SubBanner sub={sub} onUpgrade={openProfile} />
            {page === 'home'      && <HomePage      user={user} onNavigate={setPage} onProfile={openProfile} />}
            {page === 'add'       && <AddCasePage   user={user} onBack={() => setPage('home')} isExisting={false} onProfile={openProfile} />}
            {page === 'existing'  && <AddCasePage   user={user} onBack={() => setPage('home')} isExisting={true}  onProfile={openProfile} />}
            {page === 'view'      && <ViewCasesPage user={user} onBack={() => setPage('home')} onProfile={openProfile} />}
            {page === 'dashboard' && <DashboardPage user={user} onBack={() => setPage('home')} onProfile={openProfile} />}
            {profileOpen && (
              <ProfilePanel
                user={user}
                onClose={() => setProfileOpen(false)}
                onLogout={async () => { setProfileOpen(false); await logout(); }}
                refreshMe={refreshMe}
              />
            )}
          </>
        )}
      </ThemeCtx.Provider>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  // Hide the initial loader once React has mounted
  requestAnimationFrame(() => {
    const ld = document.getElementById('initial-loader');
    if (ld) { ld.classList.add('hide'); setTimeout(() => ld.remove(), 250); }
  });
</script>
</body>
</html>
