    /* ── CSS variables — toggled by data-theme on <html> ─────────────────── */

      --body-bg:      #F1F5F9;
      --body-color:   #0F172A;
      --tbl-th-bg:    #F8FAFC;
      --tbl-th-color: #475569;
      --tbl-th-bdr:   #E2E8F0;
      --tbl-hover:    #EEF2FF;
      --tbl-td-color: #334155;
      --tbl-td-bdr:   #F1F5F9;

    }
    [data-theme="dark"] {
      --body-bg:      #0F172A;
      --body-color:   #F1F5F9;
      --tbl-th-bg:    #1E293B;
      --tbl-th-color: #94A3B8;
      --tbl-th-bdr:   #334155;
      --tbl-hover:    #1E1B4B;
      --tbl-td-color: #CBD5E1;
      --tbl-td-bdr:   #334155;

    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--body-bg); color: var(--body-color); min-height: 100vh;
      transition: background-color 0.3s ease, color 0.2s ease;
    }
    #root { min-height: 100vh; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.22s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
      animation: spin 0.65s linear infinite; display: inline-block;
    }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      background: var(--tbl-th-bg); padding: 11px 14px;
      text-align: left; font-weight: 600; color: var(--tbl-th-color);
      border-bottom: 1px solid var(--tbl-th-bdr); white-space: nowrap;
      transition: background-color 0.3s, color 0.2s;
    }
    tbody tr { transition: background-color 0.15s; cursor: pointer; }
    tbody tr:hover { background: var(--tbl-hover); }
    tbody td {
      padding: 11px 14px; color: var(--tbl-td-color);
      border-bottom: 1px solid var(--tbl-td-bdr);
      transition: color 0.2s, border-color 0.3s;
    }
    tbody tr:last-child td { border-bottom: none; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    textarea { font-family: inherit; }
    select {
      appearance: none;
      background-image: var(--sel-arrow);
      background-repeat: no-repeat; background-position: right 12px center;
      padding-right: 32px !important;
    }

    /* ── Landing page animations ─────────────────────────────────────────── */
    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(40px,-50px) scale(1.1); }
      66%     { transform: translate(-30px,30px) scale(0.95); }
    }
    @keyframes cardFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%     { transform: translateY(-16px) rotate(-1deg); }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.45); }
      70%  { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    @keyframes floatUpDown {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }
    @keyframes barGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    .reveal {
      opacity: 0; transform: translateY(34px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
      will-change: opacity, transform;
    }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    .grad-text {
      background: linear-gradient(120deg,#818CF8,#38BDF8,#A78BFA,#818CF8);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: gradientShift 6s ease infinite;
    }

    .land-scroll { scroll-behavior: smooth; }
    .lift { transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease, border-color 0.25s ease; }
    .lift:hover { transform: translateY(-6px); }

    @media (prefers-reduced-motion: reduce) {
      .reveal, .grad-text, .lift { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    }
    @media (max-width: 860px) {
      .land-nav-links { display: none !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

  // ── Interest helpers ───────────────────────────────────────────────────────
  function calcMonths(loanDateStr, endDateStr) {
    if (!loanDateStr) return 1;
    const loan = new Date(loanDateStr + 'T00:00:00');
    const end  = endDateStr ? new Date(endDateStr.slice(0,10) + 'T00:00:00') : new Date();
    end.setHours(0,0,0,0); loan.setHours(0,0,0,0);
    let m = (end.getFullYear() - loan.getFullYear()) * 12 + (end.getMonth() - loan.getMonth());
    if (end.getDate() > loan.getDate()) m++;
    return Math.max(1, m);
  }
  function calcInterest(c, endDateStr) {
    if (!c.loan_date || !c.money_lent || !c.interest_rate) return null;
    const months = calcMonths(c.loan_date, endDateStr);
    const p = parseFloat(c.money_lent), r = parseFloat(c.interest_rate);
    const interest = p * (r / 100) * months;
    return { months, principal: p, interest, total: p + interest };
  }

        alert(`File too large. Maximum ${limit} MB allowed.`);

  function ChartCanvas({ type, data, options, height, themeKey }) {

      if (inst.current) { inst.current.destroy(); inst.current = null; }
      inst.current = new window.Chart(ref.current, { type, data, options: options || {} });
      return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
    }, [JSON.stringify(data), themeKey]);
    return <div style={{ height: height || 240, position: 'relative' }}><canvas ref={ref} /></div>;
  }

  // ── Scroll-reveal hook + wrapper ───────────────────────────────────────────
  function useReveal() {
    const ref = useRef(null);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const io = new IntersectionObserver(([e]) => {
        if (e.isIntersecting) { el.classList.add('is-visible'); io.unobserve(el); }
      }, { threshold: 0.12 });
      io.observe(el);
      return () => io.disconnect();
    }, []);
    return ref;
  }
  function Reveal({ children, delay = 0, style }) {
    const ref = useReveal();
    return <div ref={ref} className="reveal" style={{ transitionDelay: `${delay}ms`, ...style }}>{children}</div>;
  }

  // ── Count-up number (triggers when scrolled into view) ─────────────────────
  function AnimatedCounter({ to, prefix = '', suffix = '', duration = 1700, decimals = 0 }) {
    const [val, setVal]  = useState(0);
    const ref            = useRef(null);
    const started        = useRef(false);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const io = new IntersectionObserver(([e]) => {
        if (e.isIntersecting && !started.current) {
          started.current = true;
          const t0 = performance.now();
          const tick = now => {
            const p = Math.min(1, (now - t0) / duration);
            setVal(to * (1 - Math.pow(1 - p, 3)));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      }, { threshold: 0.4 });
      io.observe(el);
      return () => io.disconnect();
    }, [to]);
    const shown = decimals ? val.toFixed(decimals) : Math.round(val).toLocaleString('en-IN');
    return <span ref={ref}>{prefix}{shown}{suffix}</span>;
  }

      e.preventDefault(); setError(''); setLoading(true);

        await api.post('/api/auth/request-otp', { phone, purpose: 'signup' });

      finally { setLoading(false); }

      e.preventDefault(); setError(''); setLoading(true);
      try {
        if (!name.trim())   throw new Error('Please enter your name.');
        if (!code || code.length < 4) throw new Error('Enter the OTP you received.');
        await api.post('/api/auth/verify-otp', { phone, code, name, purpose: 'signup' });
        onLogin();
      } catch (err) { setError(err.message || 'Could not verify.'); }
      finally { setLoading(false); }

    // ─── Lender login flow ───

      e.preventDefault(); setError(''); setLoading(true);
      try {

  // ──────────────────────────────────────────────────────────────────────────
  // Subscription Banner (shown to tenants on every page)
  // ──────────────────────────────────────────────────────────────────────────
  function SubBanner({ sub, onUpgrade }) {
    const { C } = useTheme();
    if (!sub) return null;
    const trial   = sub.is_trial;
    const expired = !sub.active;
    const soon    = sub.days_left >= 0 && sub.days_left <= 3;
    if (!trial && !expired && !soon) return null;

    let bg = C.amberLight, color = C.amber, border = C.amberBorder, msg = '';
    if (expired)      { bg = C.errorLight;  color = C.error;  border = C.errorBorder;
                        msg = `Your subscription expired. Renew to continue.`; }
    else if (trial)   { msg = `🎁 Trial: ${sub.days_left} day${sub.days_left===1?'':'s'} remaining. Upgrade for uninterrupted access.`; }
    else if (soon)    { msg = `⏳ Subscription renews in ${sub.days_left} day${sub.days_left===1?'':'s'}.`; }

    return (
      <div style={{
        background: bg, color, borderBottom: `1px solid ${border}`,
        padding: '10px 22px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        fontSize: 13.5, fontWeight: 600, gap: 12,
      }}>
        <span>{msg}</span>
        <button onClick={onUpgrade} style={{
          background: color, color: '#fff', border: 'none', borderRadius: 7,
          padding: '6px 14px', fontSize: 12.5, fontWeight: 700, cursor: 'pointer',
        }}>{expired ? 'Renew Now' : 'Upgrade'}</button>
      </div>
    );
  }

  function BillingPage({ onBack, onLogout, onPaid }) {
    const { C, dark } = useTheme();
    const [plans, setPlans]     = useState([]);
    const [data, setData]       = useState(null);
    const [busyPlan, setBusy]   = useState('');

    const [success, setSuccess] = useState('');

      try {
        const [p, b] = await Promise.all([api.get('/api/billing/plans'), api.get('/api/billing/me')]);
        setPlans(p.filter(x => !x.is_trial));
        setData(b);
      } catch (e) { setError(e.message); }

      setBusy(plan_code); setError(''); setSuccess('');
      try {
        const order = await api.post('/api/billing/create-order', { plan_code });

        const v = await api.post('/api/billing/verify', { provider_order_id: order.provider_order_id });
        if (v.success) { setSuccess('Subscription activated!'); refresh(); onPaid?.(); }
      } catch (e) { setError(e.message); }
      finally { setBusy(''); }

        <div className="fade-in" style={{ padding: '28px 22px', maxWidth: 1000, margin: '0 auto' }}>

            boxShadow: `0 2px 14px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,

            <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 10 }}>Current Plan</div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap' }}>
                <div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>
                    {sub.plan_code.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}
                  </div>
                  <div style={{ fontSize: 13, color: sub.active ? C.success : C.error, fontWeight: 600, marginTop: 4 }}>
                    {sub.active ? `${sub.days_left} day${sub.days_left===1?'':'s'} remaining` : 'Expired — renew to continue'}
                  </div>
                  {sub.expires_at_iso && <div style={{ fontSize: 12, color: C.faint, marginTop: 4 }}>Renews / expires on {new Date(sub.expires_at_iso).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })}</div>}
                </div>
                <span style={{ padding: '6px 12px', borderRadius: 16, fontSize: 11.5, fontWeight: 700, background: sub.active ? C.successLight : C.errorLight, color: sub.active ? C.success : C.error }}>
                  {(sub.effective_status || sub.status).toUpperCase()}
                </span>
              </div>
            )}
          </div>

          {error   && <Alert type="error">{error}</Alert>}
          {success && <Alert type="success">{success}</Alert>}

          {/* Plans grid */}
          <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.06em', textTransform: 'uppercase', margin: '6px 0 14px' }}>Choose a Plan</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>

                  border: `2px solid ${isCurrent ? C.success : C.border}`,
                  boxShadow: `0 2px 14px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,
                }}>

            padding: '18px 22px', borderBottom: `1px solid ${C.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            position: 'sticky', top: 0, background: C.card, borderRadius: '18px 18px 0 0', zIndex: 2,
          }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>{title}</span>
            <button onClick={onClose} style={{
              background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8,
              width: 32, height: 32, cursor: 'pointer', color: C.muted, fontSize: 14,
            }}>✕</button>
          </div>
          <div style={{ padding: '20px 22px' }}>{children}</div>
        </div>
      </div>
    );
  }

  // ── Lender edit modal ──────────────────────────────────────────────────────
  function LenderEditModal({ u, onClose, onSaved }) {
    const [form, setForm]   = useState({ name: u.name || '', phone: u.phone || '', email: u.email || '' });
    const [days, setDays]   = useState(0);
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState('');
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

    const save = async e => {
      e.preventDefault(); setError(''); setBusy('save');
      try { await api.req(`/api/admin/users/${u.id}`, { method:'PUT', body: JSON.stringify(form) }); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(''); }
    };
    const extend = async () => {
      if (!days) return; setError(''); setBusy('ext');
      try { await api.post(`/api/admin/subscription/${u.id}/extend`, { days: parseInt(days) }); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(''); }
    };

    return (
      <Modal title={`Edit Lender #${u.id}`} onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Name"  required value={form.name}  onChange={sf('name')} />
          <Input label="Phone" type="tel" value={form.phone} onChange={sf('phone')} placeholder="9876543210" />
          <Input label="Email" type="email" value={form.email} onChange={sf('email')} placeholder="user@email.com" />
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy === 'save'}>Save Changes</Btn>
          </div>
        </form>
        <div style={{ marginTop: 24, paddingTop: 18, borderTop: '1px dashed currentColor', opacity: 0.95 }}>
          <div style={{ fontSize: 12, fontWeight: 700, opacity: 0.7, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Adjust Subscription</div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
            <div style={{ flex: 1 }}>
              <Input label="Days to add (or negative)" type="number" value={days} onChange={e => setDays(e.target.value)} placeholder="e.g. 30 or -7" />
            </div>
            <Btn variant="warning" onClick={extend} loading={busy === 'ext'}>Apply</Btn>
          </div>
        </div>
      </Modal>
    );
  }

  // ── Plan edit modal ────────────────────────────────────────────────────────
  function PlanEditModal({ p, onClose, onSaved }) {
    const isNew = !p;
    const [form, setForm] = useState({
      code: p?.code || '', name: p?.name || '',
      price_inr: p?.price_inr ?? '', duration_days: p?.duration_days ?? '',
      active: p?.active !== undefined ? p.active : true,
    });
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState(false);
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
    const save = async e => {
      e.preventDefault(); setError(''); setBusy(true);
      try {
        await api.post('/api/admin/plans', {
          ...form,
          price_inr: parseFloat(form.price_inr),
          duration_days: parseInt(form.duration_days),
          active: !!form.active,
        });
        onSaved(); onClose();
      } catch (err) { setError(err.message); } finally { setBusy(false); }
    };

    return (
      <Modal title={isNew ? 'Create Plan' : `Edit Plan: ${p.name}`} onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Code (unique key)" required value={form.code} onChange={sf('code')} disabled={!isNew} placeholder="e.g. quarterly" />
          <Input label="Display Name" required value={form.name} onChange={sf('name')} placeholder="Quarterly Plan" />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <Input label="Price (₹)" required type="number" step="0.01" value={form.price_inr} onChange={sf('price_inr')} />
            <Input label="Duration (days)" required type="number" value={form.duration_days} onChange={sf('duration_days')} />
          </div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer' }}>
            <input type="checkbox" checked={!!form.active} onChange={e => setForm(f => ({ ...f, active: e.target.checked }))} /> Active (visible to lenders)
          </label>
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy}>Save Plan</Btn>
          </div>
        </form>
      </Modal>
    );
  }

  // ── Admin create modal (super-admin only) ──────────────────────────────────
  function AdminCreateModal({ onClose, onSaved }) {
    const [form, setForm]   = useState({ name: '', username: '', password: '' });
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState(false);
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
    const save = async e => {
      e.preventDefault(); setError(''); setBusy(true);
      try { await api.post('/api/admin/create-admin', form); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(false); }
    };
    return (
      <Modal title="Create New Admin" onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Full Name" required value={form.name} onChange={sf('name')} />
          <Input label="Username"  required value={form.username} onChange={sf('username')} placeholder="alphanumeric, no spaces" />
          <Input label="Password"  required type="password" value={form.password} onChange={sf('password')} placeholder="Set a strong password" />
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy}>Create Admin</Btn>
          </div>
        </form>
      </Modal>
    );
  }

  // ── Admin Console (Phase 2) ───────────────────────────────────────────────
  function AdminConsole({ user, onLogout }) {
    const { C, dark } = useTheme();
    const [tab, setTab]         = useState('overview');
    const [users, setUsers]     = useState([]);
    const [admins, setAdmins]   = useState([]);
    const [leads, setLeads]     = useState([]);
    const [payments, setPays]   = useState([]);
    const [audit, setAudit]     = useState([]);
    const [stats, setStats]     = useState(null);
    const [charts, setCharts]   = useState(null);
    const [plans, setPlans]     = useState([]);
    const [busy, setBusy]       = useState('');
    const [error, setError]     = useState('');
    const [planByUser, setPbU]  = useState({});
    const [editingLender, setEL]   = useState(null);
    const [editingPlan, setEP]     = useState(null);   // {plan} for edit; {} for new
    const [creatingAdmin, setCA]   = useState(false);

    const load = useCallback(async () => {
      try {
        const baseReqs = [
          api.get('/api/admin/users?role=user'),
          api.get('/api/leads'),
          api.get('/api/admin/payments'),
          api.get('/api/admin/stats'),
          api.get('/api/admin/charts'),
          api.get('/api/admin/audit'),
          api.get('/api/admin/plans').catch(() => api.get('/api/billing/plans')),
        ];
        const [u, l, p, s, ch, au, pl, a] = await Promise.all([...baseReqs, api.get('/api/admin/admins')]);
        setUsers(u); setLeads(l); setPays(p); setStats(s); setCharts(ch); setAudit(au); setPlans(pl); setAdmins(a);
      } catch (e) { setError(e.message); }
    }, []);
    useEffect(() => { load(); }, [load]);

    const toggleUser = async (u) => {
      setBusy('u' + u.id);
      try { await api.post(`/api/admin/users/${u.id}/${u.status === 'active' ? 'suspend' : 'activate'}`, {}); load(); }
      catch (e) { setError(e.message); } finally { setBusy(''); }
    };
    const recordPayment = async (uid) => {
      const plan = planByUser[uid];
      if (!plan) { alert('Pick a plan first'); return; }
      setBusy('p' + uid);
      try { await api.post('/api/billing/manual-payment', { user_id: uid, plan_code: plan, method: 'cash/upi/bank' }); load(); }
      catch (e) { setError(e.message); } finally { setBusy(''); }
    };

    const tabBtn = (id, label) => (
      <button onClick={() => setTab(id)} style={{
        background: tab === id ? C.primary : 'transparent', color: tab === id ? '#fff' : C.muted,
        border: `1px solid ${tab === id ? C.primary : C.border}`, borderRadius: 9,
        padding: '8px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer',
        transition: 'all 0.15s',
      }}>{label}</button>
    );
    const k = ({ label, value, color, sub }) => (
      <div style={{
        background: C.card, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.border}`,
        boxShadow: `0 2px 8px rgba(0,0,0,${dark ? '0.3' : '0.04'})`,
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 800, color: color || C.text }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: C.faint, marginTop: 3 }}>{sub}</div>}
      </div>
    );

    const fmtINR = v => '₹' + Number(v || 0).toLocaleString('en-IN');
    const fmtMonthShort = ym => {
      if (!ym) return '';
      const [y, m] = ym.split('-');
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1] + " '" + y.slice(2);
    };

    return (
      <div style={{ minHeight: '100vh', background: C.bg }}>
        <Navbar title="Admin Console" onLogout={onLogout} />
        {editingLender && <LenderEditModal u={editingLender} onClose={() => setEL(null)} onSaved={load} />}
        {editingPlan && <PlanEditModal p={editingPlan.plan} onClose={() => setEP(null)} onSaved={load} />}
        {creatingAdmin && <AdminCreateModal onClose={() => setCA(false)} onSaved={load} />}

        <div className="fade-in" style={{ padding: '26px 22px', maxWidth: 1280, margin: '0 auto' }}>
          <p style={{ color: C.faint, fontSize: 13.5, marginBottom: 22 }}>
            Welcome, <strong style={{ color: C.text }}>{user.name}</strong> · {user.role.replace('_', ' ')}
          </p>

          {/* KPI cards */}
          {stats && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 22 }}>
              {k({ label: 'Lenders',       value: stats.total_users,  color: C.primary })}
              {k({ label: 'Active Subs',   value: stats.active_subs,  color: C.success })}
              {k({ label: 'Trial Subs',    value: stats.trial_subs,   color: C.cyan })}
              {k({ label: 'Total Cases',   value: stats.total_cases,  color: C.violet })}
              {k({ label: 'Revenue (₹)',   value: Number(stats.total_revenue).toLocaleString('en-IN'),  color: C.green })}
              {k({ label: 'Signup Leads',  value: stats.pending_leads, color: C.amber })}
            </div>
          )}

          {/* Tabs */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap' }}>
            {tabBtn('overview', '📊 Overview')}
            {tabBtn('users',    '👥 Lenders')}
            {tabBtn('admins',  '🛡 Admins')}
            {tabBtn('plans',   '💼 Plans')}
            {tabBtn('leads',    '📩 Signup Requests')}
            {tabBtn('payments', '💳 Payments')}
            {tabBtn('audit',    '📜 Audit Log')}
          </div>

          {error && <Alert type="error">{error}</Alert>}

          {/* ── OVERVIEW with charts ── */}
          {tab === 'overview' && charts && (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(360px, 1fr))', gap: 16, marginBottom: 16 }}>
                <ChartBox title="📈 Monthly Revenue (last 12 months)">
                  <LineChart
                    labels={charts.monthly.map(r => fmtMonthShort(r.month))}
                    datasets={[{ label: 'Revenue', data: charts.monthly.map(r => r.revenue),
                      borderColor: C.success, backgroundColor: C.success + '28', fill: true }]}
                    yFmt={fmtAxis} height={240}
                  />
                </ChartBox>
                <ChartBox title="👥 New Signups (last 12 months)">
                  <BarChart
                    labels={charts.monthly.map(r => fmtMonthShort(r.month))}
                    datasets={[{ label: 'Signups', data: charts.monthly.map(r => r.signups),
                      backgroundColor: C.primary + 'CC', borderRadius: 6 }]}
                    height={240}
                  />
                </ChartBox>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 16, marginBottom: 16 }}>
                <ChartBox title="📊 Subscription Status">
                  <DoughnutChart
                    labels={['Trial', 'Active', 'Expired']}
                    data={[charts.status_counts.trial, charts.status_counts.active, charts.status_counts.expired]}
                    colors={[C.cyan, C.success, C.error]} height={220}
                  />
                </ChartBox>
                <ChartBox title="💼 Active Subs by Plan">
                  {Object.keys(charts.plan_counts).length === 0
                    ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No subs yet</div>
                    : <DoughnutChart
                        labels={Object.keys(charts.plan_counts)}
                        data={Object.values(charts.plan_counts)}
                        colors={CHART_PALETTE} height={220}
                      />
                  }
                </ChartBox>
                <ChartBox title="💰 Revenue by Plan">
                  {Object.keys(charts.revenue_by_plan).length === 0
                    ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No revenue yet</div>
                    : <BarChart
                        labels={Object.keys(charts.revenue_by_plan)}
                        datasets={[{ label: 'Revenue', data: Object.values(charts.revenue_by_plan),
                          backgroundColor: CHART_PALETTE.map(c => c + 'CC'), borderRadius: 6 }]}
                        yFmt={fmtAxis} height={220}
                      />
                  }
                </ChartBox>
              </div>
            </>
          )}

          {/* ── LENDERS ── */}
          {tab === 'users' && (
            <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Plan</th><th>Days Left</th><th>Status</th><th>Manual Payment</th><th>Actions</th></tr></thead>
                  <tbody>
                    {users.map(u => {
                      const s = u.subscription;
                      return (
                        <tr key={u.id}>
                          <td>#{u.id}</td>
                          <td style={{ fontWeight: 600 }}>{u.name}</td>
                          <td>{u.phone || '—'}</td>
                          <td>{u.email || '—'}</td>
                          <td>{s?.plan_code || '—'}</td>
                          <td>
                            {s ? (() => {
                              const d = Math.ceil((new Date(s.expires_at) - new Date()) / 86400000);
                              return <span style={{ color: d < 0 ? C.error : (d < 4 ? C.amber : C.success), fontWeight: 700 }}>{d}d</span>;
                            })() : '—'}
                          </td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: u.status === 'active' ? C.successLight : C.errorLight,
                              color: u.status === 'active' ? C.success : C.error }}>{u.status.toUpperCase()}</span>
                          </td>
                          <td>
                            <div style={{ display: 'flex', gap: 6 }}>
                              <select value={planByUser[u.id] || ''} onChange={e => setPbU(m => ({ ...m, [u.id]: e.target.value }))} style={{
                                background: C.inputBg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 7, padding: '5px 8px', fontSize: 12.5,
                              }}>
                                <option value="">— plan —</option>
                                {plans.filter(p => !p.is_trial && p.active).map(p => <option key={p.code} value={p.code}>{p.name} ₹{p.price_inr}</option>)}
                              </select>
                              <Btn onClick={() => recordPayment(u.id)} loading={busy === 'p' + u.id} style={{ padding: '6px 10px', fontSize: 12 }}>Record</Btn>
                            </div>
                          </td>
                          <td>
                            <div style={{ display: 'flex', gap: 6 }}>
                              <Btn variant="secondary" onClick={() => setEL(u)} style={{ padding: '6px 10px', fontSize: 12 }}>Edit</Btn>
                              <Btn variant={u.status === 'active' ? 'danger' : 'primary'} loading={busy === 'u' + u.id} onClick={() => toggleUser(u)} style={{ padding: '6px 10px', fontSize: 12 }}>
                                {u.status === 'active' ? 'Suspend' : 'Activate'}
                              </Btn>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    {users.length === 0 && <tr><td colSpan="9" style={{ textAlign: 'center', padding: 40, color: C.faint }}>No lenders yet</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── ADMINS (super-admin only) ── */}
          {tab === 'admins' && (
            <>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                <Btn onClick={() => setCA(true)}>+ New Admin</Btn>
              </div>
              <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th></tr></thead>
                    <tbody>
                      {admins.map(a => (
                        <tr key={a.id}>
                          <td>#{a.id}</td>
                          <td style={{ fontWeight: 600 }}>{a.name}</td>
                          <td>{a.username}</td>
                          <td>{a.email || '—'}</td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: C.primaryLight, color: C.primary }}>
                              ADMIN
                            </span>
                          </td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: a.status === 'active' ? C.successLight : C.errorLight,
                              color: a.status === 'active' ? C.success : C.error }}>{a.status.toUpperCase()}</span>
                          </td>
                          <td style={{ whiteSpace: 'nowrap' }}>{(a.created_at || '').slice(0,10)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>

          {/* ── PLANS (super-admin only) ── */}
          {tab === 'plans' && (
            <>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                <Btn onClick={() => setEP({ plan: null })}>+ New Plan</Btn>
              </div>
              <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Code</th><th>Name</th><th>Price (₹)</th><th>Duration (days)</th><th>Trial?</th><th>Active</th><th></th></tr></thead>
                    <tbody>
                      {plans.map(p => (
                        <tr key={p.code}>
                          <td><code style={{ fontSize: 12, padding: '2px 7px', borderRadius: 5, background: C.bg }}>{p.code}</code></td>
                          <td style={{ fontWeight: 600 }}>{p.name}</td>
                          <td style={{ fontWeight: 700 }}>₹{Number(p.price_inr).toLocaleString('en-IN')}</td>
                          <td>{p.duration_days}</td>
                          <td>{p.is_trial ? '✓' : '—'}</td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: p.active ? C.successLight : C.errorLight,
                              color: p.active ? C.success : C.error }}>{p.active ? 'ACTIVE' : 'HIDDEN'}</span>
                          </td>
                          <td><Btn variant="secondary" onClick={() => setEP({ plan: p })} style={{ padding: '6px 12px', fontSize: 12 }}>Edit</Btn></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}

          {/* ── SIGNUP REQUESTS ── */}
          {tab === 'leads' && (
            <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>ID</th><th>When</th><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Message</th></tr></thead>
                  <tbody>
                    {leads.map(l => (
                      <tr key={l.id}>
                        <td>#{l.id}</td>
                        <td style={{ whiteSpace: 'nowrap' }}>{(l.created_at || '').slice(0,10)}</td>
                        <td style={{ fontWeight: 600 }}>{l.name}</td>
                        <td>{l.email || '—'}</td>
                        <td>{l.phone || '—'}</td>
                        <td>{l.company || '—'}</td>
                        <td style={{ maxWidth: 240, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }} title={l.message}>{l.message || '—'}</td>
                      </tr>

                    {leads.length === 0 && <tr><td colSpan="7" style={{ textAlign: 'center', padding: 40, color: C.faint }}>No signup requests</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {tab === 'payments' && (
            <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Date</th><th>User</th><th>Plan</th><th>Amount</th><th>Provider</th><th>Status</th></tr></thead>
                  <tbody>
                    {payments.map(p => (
                      <tr key={p.id}>
                        <td>#{p.id}</td>
                        <td style={{ whiteSpace: 'nowrap' }}>{(p.paid_at || p.created_at || '').slice(0,10)}</td>
                        <td>{p.user_name || p.user_id}</td>
                        <td>{p.plan_code}</td>
                        <td style={{ fontWeight: 700 }}>{fmtINR(p.amount_inr)}</td>
                        <td>{p.provider}</td>
                        <td>

  function AddCasePage({ onBack, isExisting, onLogout }) {
    const { C } = useTheme();
    const { t } = useLang();
    const blank = () => ({
      name: '', father_name: '', address: '', mobile: '', items: '', weight: '', metal: 'Gold',
      money_lent: '', interest_rate: '',
      loan_date: isExisting ? '' : todayStr(),
      loan_time: isExisting ? '' : nowTime(),
      notes: '',
      probable_close_date: '', hard_deadline: '',
      address_proof: '', lending_video: '',
    });
    const [form, setForm]       = useState(blank());
    const [loading, setLoading] = useState(false);
    const [success, setSuccess] = useState(null);
    const [error, setError]     = useState('');
    const set  = k => e => { setForm(f => ({ ...f, [k]: e.target.value })); setError(''); };
    const setF = k => v  => { setForm(f => ({ ...f, [k]: v })); };          // for file fields
    const submit = async e => {
      e.preventDefault();
      if (!form.name.trim()) { setError('Borrower name is required.'); return; }
      setLoading(true); setError('');
      try {
        const res = await api.post('/api/cases', form);
        setSuccess(res.id); setForm(blank());
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { setError(err.message || 'Failed to save.'); }
      finally { setLoading(false); }
    };
    const g2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 };
    const g3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 };

    // Hard-deadline overdue warning
    const hdPast = form.hard_deadline && new Date(form.hard_deadline) < new Date();

    return (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s' }}>
        <Navbar title={isExisting ? 'Add Existing Case' : 'Add New Case'} onBack={onBack} onLogout={onLogout} />
        <div className="fade-in" style={{ padding: '28px 20px', maxWidth: 800, margin: '0 auto' }}>
          {isExisting && <div style={{ marginBottom: 16 }}><Alert type="info">📂 Entering an existing record — fill in the original loan date &amp; time manually.</Alert></div>}
          {success && (
            <div style={{ marginBottom: 16 }}>
              <Alert type="success">✅ Case <strong>#{success}</strong> saved!{' '}
                <span style={{ textDecoration: 'underline', cursor: 'pointer' }} onClick={() => setSuccess(null)}>Add another →</span>
              </Alert>
            </div>
          )}
          <Card>
            <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>

              {/* ── Borrower Details ─────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('borrowerDetails')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('borrowerName')} required value={form.name} onChange={set('name')} placeholder="Full name" autoFocus />
                    <Input label={t('fatherName')} value={form.father_name} onChange={set('father_name')} placeholder="Father's full name" />
                  </div>
                  <div style={g2}>
                    <Input label={t('mobileNumber')} type="tel" value={form.mobile} onChange={set('mobile')} placeholder="e.g. 9876543210" />
                    <div />
                  </div>
                  <Textarea label={t('address')} value={form.address} onChange={set('address')} rows={2} placeholder="Full address..." />
                  <FileUpload
                    label={`${t('addressProof')} (Aadhaar / PAN / Passport)`}
                    accept="image/*"
                    value={form.address_proof}
                    onChange={setF('address_proof')}
                  />
                </div>
              </div>

              {/* ── Pledged Item ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('pledgedItem')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <Input label={t('items')} value={form.items} onChange={set('items')} placeholder="e.g. Gold necklace, 2 bangles, silver anklets" />
                  <div style={g3}>
                    <Input label={t('weight')} type="number" step="0.01" min="0" value={form.weight} onChange={set('weight')} placeholder="e.g. 10.5" />
                    <div style={{ gridColumn: 'span 2' }}>
                      <Select label={t('metalType')} value={form.metal} onChange={set('metal')}>
                        {METALS.map(m => <option key={m} value={m}>{m}</option>)}
                      </Select>
                    </div>
                  </div>
                </div>
              </div>

              {/* ── Loan Details ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('loanDetails')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('amountLent')} type="number" step="0.01" min="0" value={form.money_lent} onChange={set('money_lent')} placeholder="e.g. 50000" />
                    <Input label={t('interestRate')} type="number" step="0.01" min="0" value={form.interest_rate} onChange={set('interest_rate')} placeholder="e.g. 2" />
                  </div>
                  <div style={g2}>
                    <Input label={isExisting ? 'Original Loan Date' : 'Date'} type="date" value={form.loan_date} onChange={set('loan_date')} required={isExisting} />
                    <Input label={isExisting ? 'Original Loan Time' : 'Time'} type="time" value={form.loan_time} onChange={set('loan_time')} />
                  </div>
                  <div style={g2}>
                    <Input label={t('probableClose')} type="month" value={form.probable_close_date} onChange={set('probable_close_date')} />
                    <div>
                      <Input
                        label={t('hardDeadline')}
                        type="date"
                        value={form.hard_deadline}
                        onChange={set('hard_deadline')}
                        style={hdPast ? { borderColor: C.error } : {}}
                      />

                  </div>
                  <Textarea label={t('notes')} value={form.notes} onChange={set('notes')} rows={3} placeholder="Any additional notes..." />

              {/* ── Lending Proof ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('lendingProofVid')}</SectionTitle>

                  accept="video/*"
                  value={form.lending_video}
                  onChange={setF('lending_video')}

              <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-end', paddingTop: 4 }}>
                <Btn type="button" variant="secondary" onClick={onBack}>{t('cancel')}</Btn>
                <Btn type="submit" loading={loading}>💾 {t('saveCase')}</Btn>
              </div>
            </form>
          </Card>
        </div>
      </div>
    );
  }

  function CaseDetailModal({ caseId, caseBasic, onClose, onClosed }) {
    const { C } = useTheme();
    // Start with basic list data, then upgrade to full (with files) asynchronously
    const [c, setC]               = useState(caseBasic);
    const [loadingFull, setLF]    = useState(true);
    const [amtReceived,    setAmtReceived]    = useState('');
    const [closingVideo,   setClosingVideo]   = useState('');
    const [closing,        setClosing]        = useState(false);
    const [closeErr,       setCloseErr]       = useState('');
    const [done,           setDone]           = useState(false);
    const [confirmBD,      setConfirmBD]      = useState(false);
    const [markingBD,      setMarkingBD]      = useState(false);
    const [bdErr,          setBdErr]          = useState('');
    const [bdDone,         setBdDone]         = useState(false);

    useEffect(() => {
      api.get(`/api/cases/${caseId}`)
        .then(full => { setC(full); setLF(false); })
        .catch(() => setLF(false));
    }, [caseId]);

    const isOpen    = c.status === 'open';
    const isClosed  = c.status === 'closed';
    const isBadDebt = c.status === 'bad_debt';
    const canClose  = isOpen || isBadDebt;
    const calc      = calcInterest(c, isClosed ? c.closed_at : null);
    const fmtI      = v => `₹${Math.round(v).toLocaleString('en-IN')}`;

    // Hard deadline overdue check
    const hdDate   = c.hard_deadline ? new Date(c.hard_deadline) : null;
    const hdPast   = hdDate && hdDate < new Date() && !isClosed;

    const doClose = async () => {
      if (amtReceived === '') { setCloseErr('Please enter the amount received.'); return; }
      setClosing(true); setCloseErr('');
      try {
        await api.post(`/api/cases/${c.id}/close`, {
          amount_received: parseFloat(amtReceived),
          closing_video:   closingVideo || null,
        });
        setDone(true); onClosed(); setTimeout(onClose, 1800);
      } catch (e) { setCloseErr(e.message || 'Failed.'); }
      finally { setClosing(false); }
    };
    const doBadDebt = async () => {
      setMarkingBD(true); setBdErr('');
      try {
        await api.post(`/api/cases/${c.id}/bad-debt`, {});
        setBdDone(true); onClosed(); setTimeout(onClose, 1800);
      } catch (e) { setBdErr(e.message || 'Failed.'); }
      finally { setMarkingBD(false); }
    };

    const SecHd = ({ children }) => (
      <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>{children}</div>
    );

    return (
      <div onClick={e => e.target === e.currentTarget && onClose()} style={{
        position: 'fixed', inset: 0, background: C.modalOverlay, zIndex: 300,
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
        backdropFilter: 'blur(2px)',
      }}>
        <div className="fade-in" style={{
          background: C.card, borderRadius: 20, width: '100%', maxWidth: 600,
          maxHeight: '92vh', overflowY: 'auto',
          boxShadow: '0 28px 64px rgba(0,0,0,0.45)',
          border: `1px solid ${C.border}`,
          transition: 'background-color 0.3s',
        }}>
          {/* Header */}
          <div style={{
            padding: '18px 24px', borderBottom: `1px solid ${C.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            position: 'sticky', top: 0, background: C.card, zIndex: 1, borderRadius: '20px 20px 0 0',
            transition: 'background-color 0.3s',
          }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontWeight: 800, fontSize: 18, color: C.text }}>Case #{c.id}</span>
                <StatusBadge status={c.status} />
                {loadingFull && <span style={{ fontSize: 11, color: C.faint }}>loading…</span>}
              </div>
              <div style={{ fontSize: 13.5, color: C.muted, marginTop: 3 }}>{c.name}</div>
            </div>
            <button onClick={onClose} style={{
              background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8,
              width: 34, height: 34, cursor: 'pointer', fontSize: 15, color: C.muted,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>✕</button>
          </div>

          <div style={{ padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Overdue hard-deadline banner */}
            {hdPast && (
              <Alert type="error">
                🚨 <strong>Hard Deadline Passed!</strong> Deadline was {c.hard_deadline}.
                Metal can be melted / asset confiscated per terms.
              </Alert>
            )}

            {/* Borrower Details */}
            <div>
              <SecHd>Borrower Details</SecHd>
              <InfoRow label="Name"          value={c.name} />
              {c.father_name && <InfoRow label="Father's Name" value={c.father_name} />}
              {c.mobile      && <InfoRow label="Mobile"        value={c.mobile} />}
              {c.address     && <InfoRow label="Address"       value={c.address} />}
              {/* Address Proof Image */}
              {c.address_proof && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>Address Proof</div>
                  <img src={c.address_proof} alt="address proof"
                    style={{ width: '100%', maxHeight: 200, objectFit: 'cover', borderRadius: 8, border: `1px solid ${C.border}` }} />
                </div>
              )}
            </div>

            {/* Pledged Item */}
            {(c.items || c.weight || c.metal) && (
              <div>
                <SecHd>Pledged Item</SecHd>
                {c.items  && <InfoRow label="Description" value={c.items} />}
                {c.weight && <InfoRow label="Weight"      value={`${c.weight}g`} />}
                {c.metal  && <InfoRow label="Metal"       value={c.metal} />}
              </div>
            )}

            {/* Loan Details */}
            <div>
              <SecHd>Loan Details</SecHd>
              <InfoRow label="Loan Date"     value={c.loan_date || '—'} />
              {c.loan_time          && <InfoRow label="Loan Time"           value={c.loan_time} />}
              <InfoRow label="Amount Lent"   value={fmt(c.money_lent, '₹')} />
              <InfoRow label="Interest Rate" value={c.interest_rate ? `${c.interest_rate}% / month` : '—'} />
              {c.probable_close_date && (
                <InfoRow label="Probable Close"
                  value={new Date(c.probable_close_date + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })} />
              )}
              {c.hard_deadline && (
                <InfoRow label="Hard Deadline"
                  value={
                    <span style={{ color: hdPast ? C.error : C.text, fontWeight: hdPast ? 700 : 500 }}>
                      {c.hard_deadline}{hdPast ? ' ⚠️ OVERDUE' : ''}
                    </span>
                  } />
              )}
              {c.notes              && <InfoRow label="Notes"               value={c.notes} />}
            </div>

            {/* Lending proof video */}
            {c.lending_video && (
              <div>
                <SecHd>Lending Proof Video</SecHd>
                <video src={c.lending_video} controls style={{ width: '100%', borderRadius: 10, border: `1px solid ${C.border}` }} />
              </div>
            )}

            {/* Interest calculation */}
            {calc && (
              <div style={{ background: C.primaryLight, borderRadius: 14, padding: '18px 20px', border: `1px solid ${C.primary}25` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.primary, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 14 }}>
                  Interest Calculation
                  <span style={{ fontWeight: 400, fontSize: 11, marginLeft: 8, opacity: 0.7 }}>
                    ({isClosed ? `closed ${c.closed_at ? c.closed_at.slice(0,10) : ''}` : 'as of today'})
                  </span>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Principal Amount</span>
                    <span style={{ fontWeight: 600, color: C.text }}>{fmtI(calc.principal)}</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Months @ {c.interest_rate}%
                      <span style={{ fontSize: 11, marginLeft: 5, opacity: 0.65 }}>(incomplete = full)</span>
                    </span>
                    <span style={{ fontWeight: 600, color: C.text }}>{calc.months} mo</span>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.muted, fontSize: 13.5 }}>Interest Amount</span>
                    <span style={{ fontWeight: 600, color: C.text }}>{fmtI(calc.interest)}</span>
                  </div>
                  <div style={{ borderTop: `2px solid ${C.primary}35`, paddingTop: 12, marginTop: 2, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>Total (Principal + Interest)</span>
                    <span style={{ fontWeight: 800, fontSize: 22, color: C.primary }}>{fmtI(calc.total)}</span>
                  </div>
                </div>
              </div>
            )}

            {/* Close case section */}
            {canClose && !done && !bdDone && (
              <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 18 }}>
                <SecHd>Close This Case</SecHd>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <Input
                    label="Amount Received (₹)" type="number" step="0.01" min="0"
                    value={amtReceived}
                    onChange={e => { setAmtReceived(e.target.value); setCloseErr(''); }}
                    placeholder={calc ? `Total due: ₹${Math.round(calc.total).toLocaleString('en-IN')}` : 'Enter amount received'}
                  />
                  <FileUpload
                    label="Closing Proof Video (borrower collecting item — optional)"
                    accept="video/*"
                    value={closingVideo}
                    onChange={setClosingVideo}
                    maxMB={25}
                  />
                  {closeErr && <Alert type="error">{closeErr}</Alert>}
                  <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                    <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
                    <Btn variant="danger" onClick={doClose} loading={closing}>🔒 Close Case</Btn>
                  </div>
                </div>
                {isOpen && (
                  <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px dashed ${C.border}` }}>
                    {!confirmBD ? (
                      <button onClick={() => setConfirmBD(true)} style={{
                        background: 'none', border: 'none', color: C.amber,
                        cursor: 'pointer', fontSize: 13, fontWeight: 600, padding: 0,
                      }}>⚠️ Mark as Bad Debt</button>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <Alert type="warning">⚠️ Marking as bad debt means you don't expect this loan to be recovered. Are you sure?</Alert>
                        {bdErr && <Alert type="error">{bdErr}</Alert>}
                        <div style={{ display: 'flex', gap: 8 }}>
                          <Btn variant="ghost" onClick={() => setConfirmBD(false)}>Cancel</Btn>
                          <Btn variant="warning" onClick={doBadDebt} loading={markingBD}>Confirm Bad Debt</Btn>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {done   && <Alert type="success">✅ Case #{c.id} closed successfully!</Alert>}
            {bdDone && <Alert type="warning">⚠️ Case #{c.id} marked as bad debt.</Alert>}

            {/* Closure summary */}
            {isClosed && (
              <div style={{ background: C.errorLight, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.errorBorder}` }}>
                <SecHd>Closure Summary</SecHd>
                <InfoRow label="Closed At"       value={c.closed_at || '—'} />
                <InfoRow label="Amount Received" value={fmt(c.amount_received, '₹')} />
                {calc && c.amount_received != null && (() => {
                  const diff = parseFloat(c.amount_received) - Math.round(calc.total);
                  return <InfoRow label={diff >= 0 ? 'Surplus' : 'Pending Balance'}
                    value={`₹${Math.abs(diff).toLocaleString('en-IN')} ${diff >= 0 ? '(surplus)' : '(pending)'}`} />;
                })()}
                {c.closing_video && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>Closing Proof Video</div>
                    <video src={c.closing_video} controls style={{ width: '100%', borderRadius: 8, border: `1px solid ${C.errorBorder}` }} />
                  </div>
                )}
              </div>
            )}

            {isBadDebt && !bdDone && (
              <div style={{ background: C.amberLight, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.amberBorder}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.amber, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Bad Debt Notice</div>
                <p style={{ fontSize: 13, color: C.muted }}>This case is written off as bad debt. You can still close it if payment is later received.</p>
                {calc && <p style={{ fontSize: 13, color: C.muted, marginTop: 6, fontWeight: 600 }}>Outstanding today: ₹{Math.round(calc.total).toLocaleString('en-IN')}</p>}
              </div>
            )}

          </div>
        </div>
      </div>
    );
  }
