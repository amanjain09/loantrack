      --body-color:   #0F172A;

      --tbl-th-color: #475569;
      --tbl-th-bdr:   #E2E8F0;
      --tbl-hover:    #EEF2FF;
      --tbl-td-color: #334155;
      --tbl-td-bdr:   #F1F5F9;

    }
    [data-theme="dark"] {
      --body-bg:      #0F172A;
      --body-color:   #F1F5F9;
      --tbl-th-bg:    #1E293B;
      --tbl-th-color: #94A3B8;

      --tbl-td-bdr:   #334155;

    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--body-bg); color: var(--body-color); min-height: 100vh;
      transition: background-color 0.3s ease, color 0.2s ease;
    }
    #root { min-height: 100vh; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.22s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
      animation: spin 0.65s linear infinite; display: inline-block;
    }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      background: var(--tbl-th-bg); padding: 11px 14px;
      text-align: left; font-weight: 600; color: var(--tbl-th-color);
      border-bottom: 1px solid var(--tbl-th-bdr); white-space: nowrap;
      transition: background-color 0.3s, color 0.2s;
    }
    tbody tr { transition: background-color 0.15s; cursor: pointer; }
    tbody tr:hover { background: var(--tbl-hover); }
    tbody td {
      padding: 11px 14px; color: var(--tbl-td-color);
      border-bottom: 1px solid var(--tbl-td-bdr);
      transition: color 0.2s, border-color 0.3s;
    }
    tbody tr:last-child td { border-bottom: none; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    textarea { font-family: inherit; }
    select {
      appearance: none;
      background-image: var(--sel-arrow);
      background-repeat: no-repeat; background-position: right 12px center;
      padding-right: 32px !important;
    }

    /* ── Landing page animations ─────────────────────────────────────────── */
    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(40px,-50px) scale(1.1); }
      66%     { transform: translate(-30px,30px) scale(0.95); }
    }
    @keyframes cardFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%     { transform: translateY(-16px) rotate(-1deg); }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.45); }
      70%  { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    @keyframes floatUpDown {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }
    @keyframes barGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    .reveal {
      opacity: 0; transform: translateY(34px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
      will-change: opacity, transform;
    }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    .grad-text {
      background: linear-gradient(120deg,#818CF8,#38BDF8,#A78BFA,#818CF8);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: gradientShift 6s ease infinite;
    }

    .land-scroll { scroll-behavior: smooth; }
    .lift { transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease, border-color 0.25s ease; }
    .lift:hover { transform: translateY(-6px); }

    @media (prefers-reduced-motion: reduce) {
      .reveal, .grad-text, .lift { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    }
    @media (max-width: 860px) {
      .land-nav-links { display: none !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

    heroSub:        {en:"Prabhu Ventures' in-house platform for gold & asset-backed lending — automated interest, deadline tracking, video-verified records and analytics, all in one place.",hi:'प्रभु वेंचर्स का स्वर्ण और परिसंपत्ति-समर्थित ऋण के लिए मंच — स्वचालित ब्याज, समय-सीमा ट्रैकिंग, वीडियो-सत्यापित रिकॉर्ड और विश्लेषण, सब एक जगह।',bn:'প্রভু ভেঞ্চার্সের সোনা ও সম্পদ-ভিত্তিক ঋণের প্ল্যাটফর্ম — স্বয়ংক্রিয় সুদ, সময়সীমা ট্র্যাকিং, ভিডিও-যাচাইকৃত রেকর্ড ও বিশ্লেষণ, সব এক জায়গায়।',mr:'प्रभु व्हेंचर्सचे सोने आणि मालमत्ता-समर्थित कर्जासाठी मंच — स्वयंचलित व्याज, मुदत ट्रॅकिंग, व्हिडिओ-सत्यापित नोंदी आणि विश्लेषण, सर्व एका ठिकाणी.',te:'ప్రభు వెంచర్స్ ఇన్-హౌస్ ప్లాట్‌ఫారం — స్వయంచాలక వడ్డీ, గడువు ట్రాకింగ్, వీడియో-ధృవీకరించిన రికార్డులు, విశ్లేషణలు అన్నీ ఒకే చోట.',ta:'பிரபு வெஞ்சர்ஸின் தங்கம் மற்றும் சொத்து-ஆதரவு கடன் தளம் — தானியங்கி வட்டி, காலக்கெடு கண்காணிப்பு, வீடியோ-சரிபார்ப்பு பதிவுகள், அனைத்தும் ஒரே இடத்தில்.',gu:'પ્રભુ વેન્ચર્સનું ગોલ્ડ અને એસેટ-આધારિત લોન માટેનું પ્લેટફોર્મ — સ્વયંચાલિત વ્યાજ, ડેડલાઇન ટ્રેકિંગ, વીડિયો-વેરિફાઇડ રેકોર્ડ્સ અને એનાલિટિક્સ, બધું એક જગ્યાએ.',ur:'پربھو وینچرز کا گولڈ اور اثاثہ جاتی قرض کیلئے پلیٹ فارم — خودکار سود، ڈیڈ لائن ٹریکنگ، ویڈیو سے تصدیق شدہ ریکارڈز اور تجزیہ، سب ایک جگہ۔',kn:'ಪ್ರಭು ವೆಂಚರ್ಸ್‌ನ ಚಿನ್ನ ಮತ್ತು ಆಸ್ತಿ-ಬೆಂಬಲಿತ ಸಾಲಕ್ಕಾಗಿ ವೇದಿಕೆ — ಸ್ವಯಂಚಾಲಿತ ಬಡ್ಡಿ, ಗಡುವು ಟ್ರ್ಯಾಕಿಂಗ್, ವೀಡಿಯೊ-ಪರಿಶೀಲನೆ ಮಾಡಿದ ದಾಖಲೆಗಳು ಮತ್ತು ವಿಶ್ಲೇಷಣೆ, ಎಲ್ಲವೂ ಒಂದೇ ಸ್ಥಳದಲ್ಲಿ.',or:'ପ୍ରଭୁ ଭେଞ୍ଚର୍ସର ସ୍ୱର୍ଣ୍ଣ ଓ ସମ୍ପତ୍ତି-ସମର୍ଥିତ ଋଣ ପ୍ଲାଟଫର୍ମ — ସ୍ୱୟଂଚାଳିତ ସୁଧ, ସମୟସୀମା ଟ୍ରାକିଂ, ଭିଡିଓ-ସତ୍ୟାପିତ ରେକର୍ଡ ଓ ବିଶ୍ଳେଷଣ, ସବୁ ଏକାଠି।',ml:'പ്രഭു വെഞ്ച്വേർസിന്റെ സ്വർണവും ആസ്തിയും ഈടാക്കിയ വായ്പാ പ്ലാറ്റ്ഫോം — സ്വയം പ്രവർത്തിക്കുന്ന പലിശ, സമയപരിധി ട്രാക്കിംഗ്, വീഡിയോ-സാധൂകരിച്ച രേഖകൾ, അനലിറ്റിക്സ്, എല്ലാം ഒരിടത്ത്.',pa:'ਪ੍ਰਭੂ ਵੈਂਚਰਜ਼ ਦਾ ਸੋਨੇ ਅਤੇ ਸੰਪਤੀ-ਆਧਾਰਿਤ ਕਰਜ਼ੇ ਲਈ ਪਲੇਟਫਾਰਮ — ਆਟੋਮੈਟਿਕ ਵਿਆਜ, ਡੈੱਡਲਾਈਨ ਟਰੈਕਿੰਗ, ਵੀਡੀਓ-ਤਸਦੀਕਸ਼ੁਦਾ ਰਿਕਾਰਡ ਤੇ ਵਿਸ਼ਲੇਸ਼ਣ, ਸਭ ਇੱਕ ਥਾਂ।',as:'প্ৰভু ভেঞ্চাৰ্ছৰ সোনা আৰু সম্পত্তি আধাৰিত ধাৰৰ প্লেটফৰ্ম — স্বয়ংক্ৰিয় সুদ, সময়সীমা ট্ৰেকিং, ভিডিঅ\' প্ৰমাণিত ৰেকৰ্ড আৰু বিশ্লেষণ, সকলো একে ঠাইতে।',mai:'प्रभु वेंचर्सक स्वर्ण आ संपत्ति-समर्थित ऋण मंच — स्वचालित ब्याज, समय-सीमा ट्रैकिंग, वीडियो-सत्यापित रिकॉर्ड आ विश्लेषण, सब एक ठाम।',sat:'ᱯᱨᱚᱵᱷᱩ ᱣᱮᱱᱪᱚᱨᱥᱟᱜ ᱥᱚᱱᱟ ᱟᱨ ᱢᱟᱞᱢᱟᱛᱟ ᱮᱛᱚᱢ ᱯᱞᱮᱴᱯᱷᱚᱨᱢ',ks:'پربھو وینچرز کا سونے تہ ملکیت آدھارت قرض پلیٹ فارم — خودکار سود، ٹریکنگ، ویڈیو ثبوت ریکارڈ تہ تجزیہ، اکّیں جگہہ۔'},

  // ── Interest helpers ───────────────────────────────────────────────────────
  function calcMonths(loanDateStr, endDateStr) {
    if (!loanDateStr) return 1;
    const loan = new Date(loanDateStr + 'T00:00:00');
    const end  = endDateStr ? new Date(endDateStr.slice(0,10) + 'T00:00:00') : new Date();
    end.setHours(0,0,0,0); loan.setHours(0,0,0,0);
    let m = (end.getFullYear() - loan.getFullYear()) * 12 + (end.getMonth() - loan.getMonth());
    if (end.getDate() > loan.getDate()) m++;
    return Math.max(1, m);
  }
  function calcInterest(c, endDateStr) {
    if (!c.loan_date || !c.money_lent || !c.interest_rate) return null;
    const months = calcMonths(c.loan_date, endDateStr);
    const p = parseFloat(c.money_lent), r = parseFloat(c.interest_rate);
    const interest = p * (r / 100) * months;
    return { months, principal: p, interest, total: p + interest };
  }

    const { C } = useTheme();

      if (!file) return;
      if (file.size > limit * 1024 * 1024) {
        alert(`File too large. Maximum ${limit} MB allowed.`);
        e.target.value = '';
        return;

      try { onChange(await fileToBase64(file)); } catch { alert('Could not read file.'); }

    return (

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

      inst.current = new window.Chart(ref.current, { type, data, options: options || {} });

  // ── Scroll-reveal hook + wrapper ───────────────────────────────────────────
  function useReveal() {
    const ref = useRef(null);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const io = new IntersectionObserver(([e]) => {
        if (e.isIntersecting) { el.classList.add('is-visible'); io.unobserve(el); }
      }, { threshold: 0.12 });
      io.observe(el);
      return () => io.disconnect();
    }, []);
    return ref;
  }
  function Reveal({ children, delay = 0, style }) {
    const ref = useReveal();
    return <div ref={ref} className="reveal" style={{ transitionDelay: `${delay}ms`, ...style }}>{children}</div>;
  }

  // ── Count-up number (triggers when scrolled into view) ─────────────────────
  function AnimatedCounter({ to, prefix = '', suffix = '', duration = 1700, decimals = 0 }) {
    const [val, setVal]  = useState(0);
    const ref            = useRef(null);
    const started        = useRef(false);
    useEffect(() => {
      const el = ref.current; if (!el) return;
      const io = new IntersectionObserver(([e]) => {
        if (e.isIntersecting && !started.current) {
          started.current = true;
          const t0 = performance.now();
          const tick = now => {
            const p = Math.min(1, (now - t0) / duration);
            setVal(to * (1 - Math.pow(1 - p, 3)));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      }, { threshold: 0.4 });
      io.observe(el);
      return () => io.disconnect();
    }, [to]);
    const shown = decimals ? val.toFixed(decimals) : Math.round(val).toLocaleString('en-IN');
    return <span ref={ref}>{prefix}{shown}{suffix}</span>;
  }

                <Btn type="submit" loading={loading} style={{ width: '100%', padding: 12, fontSize: 15, marginTop: 4 }}>{t('signIn')} →</Btn>
                <p style={{ textAlign: 'center', fontSize: 11.5, color: C.faint }}>🔒 Authorised staff only</p>
              </form>
            )}
            {mode === 'admin' && needsTotp && (
              <form onSubmit={doAdminTotp} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <h3 style={{ fontSize: 17, fontWeight: 800, color: C.text }}>🔐 Two-Factor Authentication</h3>
                <p style={{ fontSize: 13, color: C.muted, marginTop: -6 }}>Open your authenticator app and enter the 6-digit code.</p>
                <Input label="Code" required autoFocus value={totpCode} onChange={e => setTotpCode(e.target.value.replace(/\D/g, '').slice(0, 6))} placeholder="123456" />
                {error && <Alert type="error">{error}</Alert>}
                <Btn type="submit" loading={loading} style={{ width: '100%', padding: 12, fontSize: 15 }}>Verify →</Btn>
                <button type="button" onClick={() => { setNeedsTotp(false); setTotpCode(''); setError(''); }} style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 12 }}>← back</button>
              </form>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Subscription Banner (shown to tenants on every page)
  // ──────────────────────────────────────────────────────────────────────────
  function SubBanner({ sub, onUpgrade }) {
    const { C } = useTheme();
    if (!sub) return null;
    const trial   = sub.is_trial;
    const expired = !sub.active;
    const soon    = sub.days_left >= 0 && sub.days_left <= 3;
    if (!trial && !expired && !soon) return null;

    let bg = C.amberLight, color = C.amber, border = C.amberBorder, msg = '';
    if (expired)      { bg = C.errorLight;  color = C.error;  border = C.errorBorder;
                        msg = `Your subscription expired. Renew to continue.`; }
    else if (trial)   { msg = `🎁 Trial: ${sub.days_left} day${sub.days_left===1?'':'s'} remaining. Upgrade for uninterrupted access.`; }
    else if (soon)    { msg = `⏳ Subscription renews in ${sub.days_left} day${sub.days_left===1?'':'s'}.`; }

    return (
      <div style={{
        background: bg, color, borderBottom: `1px solid ${border}`,
        padding: '10px 22px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        fontSize: 13.5, fontWeight: 600, gap: 12,
      }}>
        <span>{msg}</span>
        <button onClick={onUpgrade} style={{
          background: color, color: '#fff', border: 'none', borderRadius: 7,
          padding: '6px 14px', fontSize: 12.5, fontWeight: 700, cursor: 'pointer',
        }}>{expired ? 'Renew Now' : 'Upgrade'}</button>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Billing Page (tenant)
  // ──────────────────────────────────────────────────────────────────────────
  function BillingPage({ onBack, onLogout, onPaid }) {
    const { C, dark } = useTheme();
    const [plans, setPlans]     = useState([]);
    const [data, setData]       = useState(null);
    const [busyPlan, setBusy]   = useState('');
    const [error, setError]     = useState('');
    const [success, setSuccess] = useState('');

    const refresh = useCallback(async () => {
      try {
        const [p, b] = await Promise.all([api.get('/api/billing/plans'), api.get('/api/billing/me')]);
        setPlans(p.filter(x => !x.is_trial));
        setData(b);
      } catch (e) { setError(e.message); }
    }, []);
    useEffect(() => { refresh(); }, [refresh]);

    const buy = async (plan_code) => {
      setBusy(plan_code); setError(''); setSuccess('');
      try {
        const order = await api.post('/api/billing/create-order', { plan_code });
        // Manual provider: immediately verify (admin will reconcile offline)
        const v = await api.post('/api/billing/verify', { provider_order_id: order.provider_order_id });
        if (v.success) { setSuccess('Subscription activated!'); refresh(); onPaid?.(); }
      } catch (e) { setError(e.message); }
      finally { setBusy(''); }
    };

    const sub = data?.subscription;
    return (
      <div style={{ minHeight: '100vh', background: C.bg }}>
        <Navbar title="Billing & Subscription" onBack={onBack} onLogout={onLogout} />
        <div className="fade-in" style={{ padding: '28px 22px', maxWidth: 1000, margin: '0 auto' }}>
          {/* Current subscription card */}
          <div style={{
            background: C.card, borderRadius: 16, padding: '22px 24px',
            border: `1px solid ${C.border}`, marginBottom: 22,
            boxShadow: `0 2px 14px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,
          }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 10 }}>Current Plan</div>
            {!sub ? <div style={{ color: C.faint }}>No subscription yet.</div> : (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap' }}>
                <div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>
                    {sub.plan_code.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}
                  </div>
                  <div style={{ fontSize: 13, color: sub.active ? C.success : C.error, fontWeight: 600, marginTop: 4 }}>
                    {sub.active ? `${sub.days_left} day${sub.days_left===1?'':'s'} remaining` : 'Expired — renew to continue'}
                  </div>
                  {sub.expires_at_iso && <div style={{ fontSize: 12, color: C.faint, marginTop: 4 }}>Renews / expires on {new Date(sub.expires_at_iso).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })}</div>}
                </div>
                <span style={{ padding: '6px 12px', borderRadius: 16, fontSize: 11.5, fontWeight: 700, background: sub.active ? C.successLight : C.errorLight, color: sub.active ? C.success : C.error }}>
                  {(sub.effective_status || sub.status).toUpperCase()}
                </span>
              </div>
            )}
          </div>

          {error   && <Alert type="error">{error}</Alert>}
          {success && <Alert type="success">{success}</Alert>}

          {/* Plans grid */}
          <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.06em', textTransform: 'uppercase', margin: '6px 0 14px' }}>Choose a Plan</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16 }}>
            {plans.map(p => {
              const isCurrent = sub?.plan_code === p.code && sub?.active;
              return (
                <div key={p.code} style={{
                  background: C.card, borderRadius: 16, padding: '22px 22px',
                  border: `2px solid ${isCurrent ? C.success : C.border}`,
                  boxShadow: `0 2px 14px rgba(0,0,0,${dark ? '0.3' : '0.05'})`,
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{p.name}</div>
                  <div style={{ fontSize: 30, fontWeight: 900, color: C.text, marginTop: 8 }}>₹{Number(p.price_inr).toLocaleString('en-IN')}</div>
                  <div style={{ fontSize: 12.5, color: C.faint, marginTop: 4 }}>for {p.duration_days} days</div>
                  <Btn onClick={() => buy(p.code)} loading={busyPlan === p.code} disabled={isCurrent} style={{ width: '100%', marginTop: 18 }}>
                    {isCurrent ? '✓ Current Plan' : 'Subscribe'}
                  </Btn>
                </div>
              );
            })}
          </div>

          {/* Payment history */}
          {data?.payments?.length > 0 && (
            <div style={{ marginTop: 28 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 12 }}>Payment History</div>
              <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Date</th><th>Plan</th><th>Amount</th><th>Method</th><th>Status</th></tr></thead>
                    <tbody>
                      {data.payments.map(p => (
                        <tr key={p.id}>
                          <td style={{ whiteSpace: 'nowrap' }}>{(p.paid_at || p.created_at || '').slice(0,10)}</td>
                          <td>{p.plan_code}</td>
                          <td>₹{Number(p.amount_inr).toLocaleString('en-IN')}</td>
                          <td>{p.provider}</td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: p.status === 'success' ? C.successLight : C.errorLight,
                              color: p.status === 'success' ? C.success : C.error,
                            }}>{p.status.toUpperCase()}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Tenant Profile Panel — slides in from the right, contains:
  //   • Header (avatar, name, customer-id, phone)
  //   • Profile details (editable: name, email, address, business name)
  //   • KYC details (editable: aadhaar, pan, dob)
  //   • Subscription & billing (current plan + plans grid + history)
  //   • Preferences (language, theme)
  //   • Logout at the very bottom
  // ──────────────────────────────────────────────────────────────────────────
  function ProfilePanel({ user, onClose, onLogout, refreshMe }) {
    const { C, dark, toggle } = useTheme();
    const { lang, setLang, t } = useLang();
    const [data, setData]       = useState(null);
    const [plans, setPlans]     = useState([]);
    const [editing, setEditing] = useState(false);
    const [form, setForm]       = useState({});
    const [savingForm, setSF]   = useState(false);
    const [editErr, setEditErr] = useState('');
    const [busyPlan, setBP]     = useState('');
    const [billErr, setBillErr] = useState('');
    const [billOK, setBillOK]   = useState('');

    // 5h Branches state
    const [branches, setBranches]       = useState([]);
    const [newBranch, setNewBranch]     = useState({ name: '', address: '' });
    const [addingBranch, setAddingBranch] = useState(false);

    // 5f 2FA state
    const [twofa, setTwofa]     = useState(null);   // { secret, uri } during setup
    const [totp, setTotp]       = useState('');
    const [twofaErr, setTwofaErr] = useState('');

    const load = useCallback(async () => {
      try {
        const [d, p, br] = await Promise.all([
          api.get('/api/users/me/profile'),
          api.get('/api/billing/plans'),
          api.get('/api/branches').catch(() => []),
        ]);
        setData(d); setPlans(p.filter(x => !x.is_trial)); setBranches(br);
      } catch (e) { /* swallow */ }
    }, []);

    const addBranch = async () => {
      if (!newBranch.name.trim()) return;
      try {
        await api.post('/api/branches', { ...newBranch, is_default: branches.length === 0 });
        setNewBranch({ name: '', address: '' }); setAddingBranch(false);
        load();
      } catch (e) { /* swallow */ }
    };
    const deleteBranch = async (id) => {
      if (!confirm('Delete this branch? Cases assigned to it will become unassigned.')) return;
      try { await api.req(`/api/branches/${id}`, { method: 'DELETE' }); load(); } catch {}
    };

    const start2FA = async () => {
      setTwofaErr('');
      try { setTwofa(await api.post('/api/auth/2fa/setup', {})); }
      catch (e) { setTwofaErr(e.message); }
    };
    const confirm2FA = async () => {
      setTwofaErr('');
      try { await api.post('/api/auth/2fa/verify', { code: totp }); setTwofa(null); setTotp(''); load(); refreshMe?.(); }
      catch (e) { setTwofaErr(e.message); }
    };
    const disable2FA = async () => {
      if (!confirm('Disable 2FA on your account?')) return;
      try { await api.post('/api/auth/2fa/disable', {}); load(); refreshMe?.(); } catch {}
    };
    useEffect(() => { load(); }, [load]);

    useEffect(() => {
      const onEsc = e => { if (e.key === 'Escape') onClose(); };
      document.addEventListener('keydown', onEsc);
      return () => document.removeEventListener('keydown', onEsc);
    }, [onClose]);

    const startEdit = () => {
      const p = data?.profile || {};
      setForm({
        name: p.name || '', email: p.email || '', address: p.address || '',
        business_name: p.business_name || '', aadhaar: p.aadhaar || '',
        pan: p.pan || '', dob: p.dob || '',
      });
      setEditing(true); setEditErr('');
    };
    const ef = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
    const doSave = async () => {
      setSF(true); setEditErr('');
      try {
        await api.req('/api/users/me', { method: 'PATCH', body: JSON.stringify(form) });
        await load(); refreshMe?.();
        setEditing(false);
      } catch (e) { setEditErr(e.message || 'Could not save.'); }
      finally { setSF(false); }
    };

    const buy = async (planCode) => {
      setBP(planCode); setBillErr(''); setBillOK('');
      try {
        const order = await api.post('/api/billing/create-order', { plan_code: planCode });
        const v = await api.post('/api/billing/verify', { provider_order_id: order.provider_order_id });
        if (v.success) { setBillOK('Subscription activated!'); load(); refreshMe?.(); }
      } catch (e) { setBillErr(e.message || 'Could not subscribe.'); }
      finally { setBP(''); }
    };

    const p = data?.profile;
    const sub = data?.subscription;
    const payments = data?.payments || [];

    const SecHead = ({ children, action }) => (
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 12,
      }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{children}</div>
        {action}
      </div>
    );
    const Row = ({ label, value }) => (
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
        gap: 12, padding: '7px 0', borderBottom: `1px solid ${C.border}`,
      }}>
        <span style={{ color: C.muted, fontSize: 12.5, flexShrink: 0 }}>{label}</span>
        <span style={{ color: C.text, fontWeight: 600, fontSize: 13, textAlign: 'right', wordBreak: 'break-word' }}>{value || '—'}</span>
      </div>
    );
    const maskAadhaar = (a) => a ? `xxxx-xxxx-${String(a).replace(/\D/g,'').slice(-4)}` : null;
    const maskPan     = (p) => p ? `${String(p).slice(0,2)}xxxxx${String(p).slice(-1)}` : null;

    return (
      <div onClick={e => e.target === e.currentTarget && onClose()} style={{
        position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 600,
        backdropFilter: 'blur(3px)',
      }}>
        <div className="fade-in" style={{
          position: 'absolute', top: 0, right: 0, width: 'min(440px, 100vw)', height: '100vh',
          background: C.bg, borderLeft: `1px solid ${C.border}`,
          boxShadow: '-30px 0 60px rgba(0,0,0,0.35)',
          display: 'flex', flexDirection: 'column',
        }}>
          {/* Header */}
          <div style={{
            background: C.navBg, color: '#fff', padding: '18px 22px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <Avatar name={p?.name || user?.name} size={50} bg="rgba(255,255,255,0.25)" />
              <div>
                <div style={{ fontSize: 16, fontWeight: 800 }}>{p?.name || user?.name}</div>
                {p?.customer_id && (
                  <div style={{ fontSize: 12, opacity: 0.85, fontWeight: 600, marginTop: 2 }}>
                    Customer ID: <span style={{ fontFamily: 'ui-monospace, monospace' }}>{p.customer_id}</span>
                  </div>
                )}
                {p?.phone && <div style={{ fontSize: 12, opacity: 0.78, marginTop: 1 }}>+91 {p.phone}</div>}
              </div>
            </div>
            <button onClick={onClose} style={{
              background: 'rgba(255,255,255,0.18)', border: '1px solid rgba(255,255,255,0.25)',
              borderRadius: 8, width: 34, height: 34, color: '#fff', cursor: 'pointer', fontSize: 14,
            }}>✕</button>
          </div>

          {/* Scroll body */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '22px 22px 12px' }}>

            {!data ? <div style={{ color: C.faint, textAlign: 'center', padding: 30 }}>Loading…</div> : (
              <>
                {/* Profile Details (with edit) */}
                <SecHead action={!editing && <Btn variant="secondary" onClick={startEdit} style={{ padding: '5px 12px', fontSize: 12 }}>✏️ {t('edit')}</Btn>}>{t('profileDetails')}</SecHead>
                {!editing && (
                  <div style={{ background: C.card, borderRadius: 12, padding: '8px 16px', border: `1px solid ${C.border}`, marginBottom: 18 }}>
                    <Row label="Name"          value={p?.name} />
                    <Row label="Email"         value={p?.email} />
                    <Row label="Phone"         value={p?.phone ? `+91 ${p.phone}  · verified ✓` : null} />
                    <Row label="Business"      value={p?.business_name} />
                    <Row label="Address"       value={p?.address} />
                  </div>
                )}
                {editing && (
                  <div style={{ background: C.card, borderRadius: 12, padding: '16px', border: `1px solid ${C.border}`, marginBottom: 18, display: 'flex', flexDirection: 'column', gap: 12 }}>
                    <Input label="Name" required value={form.name} onChange={ef('name')} />
                    <Input label="Email" type="email" value={form.email} onChange={ef('email')} />
                    <Input label="Business / Firm" value={form.business_name} onChange={ef('business_name')} />
                    <Textarea label="Address" rows={2} value={form.address} onChange={ef('address')} />
                    <div style={{ height: 1, background: C.border, margin: '4px 0' }} />
                    <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em' }}>KYC Details</div>
                    <Input label="Aadhaar Number" value={form.aadhaar} onChange={ef('aadhaar')} placeholder="1234-5678-9012" />
                    <Input label="PAN" value={form.pan} onChange={ef('pan')} placeholder="ABCDE1234F" />
                    <Input label="Date of Birth" type="date" value={form.dob} onChange={ef('dob')} />
                    {editErr && <Alert type="error">{editErr}</Alert>}
                    <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                      <Btn variant="secondary" onClick={() => { setEditing(false); setEditErr(''); }}>Cancel</Btn>
                      <Btn onClick={doSave} loading={savingForm}>Save</Btn>
                    </div>
                  </div>
                )}

                {/* KYC summary (read-only) */}
                {!editing && (
                  <>
                    <SecHead>{t('kycDetails')}</SecHead>
                    <div style={{ background: C.card, borderRadius: 12, padding: '8px 16px', border: `1px solid ${C.border}`, marginBottom: 18 }}>
                      <Row label="Aadhaar"  value={maskAadhaar(p?.aadhaar)} />
                      <Row label="PAN"      value={maskPan(p?.pan)} />
                      <Row label="DOB"      value={p?.dob} />
                      <Row label="Status"   value={
                        <span style={{
                          padding: '2px 9px', borderRadius: 12, fontSize: 11, fontWeight: 700,
                          background: (p?.kyc_status === 'verified') ? C.successLight : C.amberLight,
                          color:      (p?.kyc_status === 'verified') ? C.success      : C.amber,
                          textTransform: 'uppercase',
                        }}>{p?.kyc_status || 'pending'}</span>
                      } />
                    </div>
                  </>
                )}

                {/* Subscription & Billing */}
                <SecHead>{t('subscription')}</SecHead>
                <div style={{ background: C.card, borderRadius: 12, padding: '14px 16px', border: `1px solid ${C.border}`, marginBottom: 12 }}>
                  {!sub ? <div style={{ color: C.faint, fontSize: 13 }}>No active subscription.</div> : (
                    <>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>
                            {String(sub.plan_code).replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}
                          </div>
                          <div style={{ fontSize: 12, color: sub.active ? C.success : C.error, fontWeight: 600, marginTop: 2 }}>
                            {sub.active ? `${sub.days_left} day${sub.days_left===1?'':'s'} remaining` : 'Expired'}
                          </div>
                          {sub.expires_at_iso && (
                            <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>
                              Until {new Date(sub.expires_at_iso).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })}
                            </div>
                          )}
                        </div>
                        <span style={{
                          padding: '4px 10px', borderRadius: 14, fontSize: 11, fontWeight: 800,
                          background: sub.active ? C.successLight : C.errorLight,
                          color:      sub.active ? C.success      : C.error,
                          textTransform: 'uppercase',
                        }}>{sub.effective_status || sub.status}</span>
                      </div>
                    </>
                  )}
                </div>

                {/* Plans grid */}
                {billErr && <Alert type="error">{billErr}</Alert>}
                {billOK  && <Alert type="success">{billOK}</Alert>}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 18 }}>
                  {plans.map(pl => {
                    const isCurrent = sub?.plan_code === pl.code && sub?.active;
                    return (
                      <div key={pl.code} style={{
                        background: C.card, borderRadius: 12, padding: '12px 14px',
                        border: `2px solid ${isCurrent ? C.success : C.border}`,
                      }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, textTransform: 'uppercase' }}>{pl.name}</div>
                        <div style={{ fontSize: 18, fontWeight: 800, color: C.text, marginTop: 4 }}>₹{Number(pl.price_inr).toLocaleString('en-IN')}</div>
                        <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>{pl.duration_days} days</div>
                        <Btn onClick={() => buy(pl.code)} loading={busyPlan === pl.code} disabled={isCurrent} style={{ width: '100%', marginTop: 10, padding: '7px 10px', fontSize: 12 }}>
                          {isCurrent ? '✓ Current' : 'Subscribe'}
                        </Btn>
                      </div>
                    );
                  })}
                </div>

                {/* Payment history */}
                {payments.length > 0 && (
                  <>
                    <SecHead>{t('paymentHistory')}</SecHead>
                    <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, marginBottom: 18, overflow: 'hidden' }}>
                      <div className="tbl-wrap">
                        <table>
                          <thead><tr><th>Date</th><th>Plan</th><th>Amount</th><th>Status</th></tr></thead>
                          <tbody>
                            {payments.map(pmt => (
                              <tr key={pmt.id}>
                                <td style={{ whiteSpace: 'nowrap', fontSize: 12 }}>{(pmt.paid_at || pmt.created_at || '').slice(0,10)}</td>
                                <td style={{ fontSize: 12 }}>{pmt.plan_code}</td>
                                <td style={{ fontSize: 12, fontWeight: 700 }}>₹{Number(pmt.amount_inr).toLocaleString('en-IN')}</td>
                                <td>
                                  <span style={{ padding:'2px 7px', borderRadius:12, fontSize:10, fontWeight:700,
                                    background: pmt.status === 'success' ? C.successLight : C.errorLight,
                                    color: pmt.status === 'success' ? C.success : C.error }}>
                                    {pmt.status.toUpperCase()}
                                  </span>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </>
                )}

                {/* Branches */}
                <SecHead action={!addingBranch && <Btn variant="secondary" onClick={() => setAddingBranch(true)} style={{ padding: '5px 12px', fontSize: 12 }}>+ {t('addNewCase').split(' ')[0]}</Btn>}>{t('branches')}</SecHead>
                <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: '6px 14px', marginBottom: 18 }}>
                  {branches.length === 0 && !addingBranch && <div style={{ fontSize: 12.5, color: C.faint, padding: '6px 0' }}>No branches yet — add your first to start scoping cases by location.</div>}
                  {branches.map(b => (
                    <div key={b.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: `1px solid ${C.border}` }}>
                      <div>
                        <div style={{ fontSize: 13.5, fontWeight: 700, color: C.text }}>
                          {b.name} {b.is_default ? <span style={{ fontSize: 10, color: C.success, marginLeft: 6 }}>DEFAULT</span> : null}
                        </div>
                        {b.address && <div style={{ fontSize: 12, color: C.muted }}>{b.address}</div>}
                      </div>
                      <button onClick={() => deleteBranch(b.id)} style={{ background: 'none', border: 'none', color: C.error, cursor: 'pointer', fontSize: 12, fontWeight: 600 }}>Remove</button>
                    </div>
                  ))}
                  {addingBranch && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, padding: '8px 0' }}>
                      <Input label="Branch Name" value={newBranch.name} onChange={e => setNewBranch(b => ({ ...b, name: e.target.value }))} />
                      <Input label="Address (optional)" value={newBranch.address} onChange={e => setNewBranch(b => ({ ...b, address: e.target.value }))} />
                      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                        <Btn variant="ghost" onClick={() => setAddingBranch(false)}>Cancel</Btn>
                        <Btn onClick={addBranch}>Save</Btn>
                      </div>
                    </div>
                  )}
                </div>

                {/* Preferences */}
                <SecHead>{t('preferences')}</SecHead>
                <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${C.border}`, padding: '8px 14px', marginBottom: 18 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0' }}>
                    <span style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>{t('language')}</span>
                    <select value={lang} onChange={e => setLang(e.target.value)} style={{
                      background: C.inputBg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 8,
                      padding: '6px 28px 6px 10px', fontSize: 12.5, fontWeight: 600, minWidth: 140,
                    }}>
                      {Object.entries(LANGS).map(([code, name]) => <option key={code} value={code}>{name}</option>)}
                    </select>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderTop: `1px solid ${C.border}` }}>
                    <span style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>{t('theme')}</span>
                    <button onClick={toggle} style={{
                      background: C.primaryLight, color: C.primary, border: `1px solid ${C.primary}40`,
                      borderRadius: 8, padding: '6px 14px', fontSize: 12.5, fontWeight: 700, cursor: 'pointer',
                    }}>{dark ? '☀️ Light' : '🌙 Dark'}</button>
                  </div>
                </div>
              </>
            )}

          </div>

          {/* Logout footer */}
          <div style={{ borderTop: `1px solid ${C.border}`, padding: '14px 22px', flexShrink: 0, background: C.card }}>
            <Btn variant="danger" onClick={onLogout} style={{ width: '100%' }}>🚪 {t('logout') || 'Logout'}</Btn>
          </div>
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Admin Console
  // ──────────────────────────────────────────────────────────────────────────
  // ── Generic modal shell (reused for edit forms) ────────────────────────────
  function Modal({ title, onClose, children, maxWidth = 460 }) {
    const { C } = useTheme();
    return (
      <div onClick={e => e.target === e.currentTarget && onClose()} style={{
        position: 'fixed', inset: 0, background: C.modalOverlay, zIndex: 500,
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
        backdropFilter: 'blur(4px)',
      }}>
        <div className="fade-in" style={{
          background: C.card, borderRadius: 18, width: '100%', maxWidth,
          maxHeight: '92vh', overflowY: 'auto', border: `1px solid ${C.border}`,
          boxShadow: '0 28px 64px rgba(0,0,0,0.4)',
        }}>
          <div style={{
            padding: '18px 22px', borderBottom: `1px solid ${C.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            position: 'sticky', top: 0, background: C.card, borderRadius: '18px 18px 0 0', zIndex: 2,
          }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>{title}</span>
            <button onClick={onClose} style={{
              background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8,
              width: 32, height: 32, cursor: 'pointer', color: C.muted, fontSize: 14,
            }}>✕</button>
          </div>
          <div style={{ padding: '20px 22px' }}>{children}</div>
        </div>
      </div>
    );
  }

  // ── Lender edit modal ──────────────────────────────────────────────────────
  function LenderEditModal({ u, onClose, onSaved }) {
    const [form, setForm]   = useState({ name: u.name || '', phone: u.phone || '', email: u.email || '' });
    const [days, setDays]   = useState(0);
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState('');
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

    const save = async e => {
      e.preventDefault(); setError(''); setBusy('save');
      try { await api.req(`/api/admin/users/${u.id}`, { method:'PUT', body: JSON.stringify(form) }); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(''); }
    };
    const extend = async () => {
      if (!days) return; setError(''); setBusy('ext');
      try { await api.post(`/api/admin/subscription/${u.id}/extend`, { days: parseInt(days) }); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(''); }
    };

    return (
      <Modal title={`Edit Lender #${u.id}`} onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Name"  required value={form.name}  onChange={sf('name')} />
          <Input label="Phone" type="tel" value={form.phone} onChange={sf('phone')} placeholder="9876543210" />
          <Input label="Email" type="email" value={form.email} onChange={sf('email')} placeholder="user@email.com" />
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy === 'save'}>Save Changes</Btn>
          </div>
        </form>
        <div style={{ marginTop: 24, paddingTop: 18, borderTop: '1px dashed currentColor', opacity: 0.95 }}>
          <div style={{ fontSize: 12, fontWeight: 700, opacity: 0.7, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Adjust Subscription</div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
            <div style={{ flex: 1 }}>
              <Input label="Days to add (or negative)" type="number" value={days} onChange={e => setDays(e.target.value)} placeholder="e.g. 30 or -7" />
            </div>
            <Btn variant="warning" onClick={extend} loading={busy === 'ext'}>Apply</Btn>
          </div>
        </div>
      </Modal>
    );
  }

  // ── Plan edit modal ────────────────────────────────────────────────────────
  function PlanEditModal({ p, onClose, onSaved }) {
    const isNew = !p;
    const [form, setForm] = useState({
      code: p?.code || '', name: p?.name || '',
      price_inr: p?.price_inr ?? '', duration_days: p?.duration_days ?? '',
      active: p?.active !== undefined ? p.active : true,
    });
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState(false);
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
    const save = async e => {
      e.preventDefault(); setError(''); setBusy(true);
      try {
        await api.post('/api/admin/plans', {
          ...form,
          price_inr: parseFloat(form.price_inr),
          duration_days: parseInt(form.duration_days),
          active: !!form.active,
        });
        onSaved(); onClose();
      } catch (err) { setError(err.message); } finally { setBusy(false); }
    };

    return (
      <Modal title={isNew ? 'Create Plan' : `Edit Plan: ${p.name}`} onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Code (unique key)" required value={form.code} onChange={sf('code')} disabled={!isNew} placeholder="e.g. quarterly" />
          <Input label="Display Name" required value={form.name} onChange={sf('name')} placeholder="Quarterly Plan" />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <Input label="Price (₹)" required type="number" step="0.01" value={form.price_inr} onChange={sf('price_inr')} />
            <Input label="Duration (days)" required type="number" value={form.duration_days} onChange={sf('duration_days')} />
          </div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer' }}>
            <input type="checkbox" checked={!!form.active} onChange={e => setForm(f => ({ ...f, active: e.target.checked }))} /> Active (visible to lenders)
          </label>
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy}>Save Plan</Btn>
          </div>
        </form>
      </Modal>
    );
  }

  // ── Admin create modal (super-admin only) ──────────────────────────────────
  function AdminCreateModal({ onClose, onSaved }) {
    const [form, setForm]   = useState({ name: '', username: '', password: '' });
    const [error, setError] = useState('');
    const [busy, setBusy]   = useState(false);
    const sf = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
    const save = async e => {
      e.preventDefault(); setError(''); setBusy(true);
      try { await api.post('/api/admin/create-admin', form); onSaved(); onClose(); }
      catch (err) { setError(err.message); } finally { setBusy(false); }
    };
    return (
      <Modal title="Create New Admin" onClose={onClose}>
        <form onSubmit={save} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Full Name" required value={form.name} onChange={sf('name')} />
          <Input label="Username"  required value={form.username} onChange={sf('username')} placeholder="alphanumeric, no spaces" />
          <Input label="Password"  required type="password" value={form.password} onChange={sf('password')} placeholder="Set a strong password" />
          {error && <Alert type="error">{error}</Alert>}
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn type="button" variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn type="submit" loading={busy}>Create Admin</Btn>
          </div>
        </form>
      </Modal>
    );
  }

  // ── Admin Console (Phase 2) ───────────────────────────────────────────────
  function AdminConsole({ user, onLogout }) {
    const { C, dark } = useTheme();
    const { t } = useLang();
    const [tab, setTab]         = useState('overview');
    const [users, setUsers]     = useState([]);
    const [admins, setAdmins]   = useState([]);
    const [leads, setLeads]     = useState([]);
    const [payments, setPays]   = useState([]);
    const [audit, setAudit]     = useState([]);
    const [stats, setStats]     = useState(null);
    const [charts, setCharts]   = useState(null);
    const [plans, setPlans]     = useState([]);
    const [busy, setBusy]       = useState('');
    const [error, setError]     = useState('');
    const [planByUser, setPbU]  = useState({});
    const [editingLender, setEL]   = useState(null);
    const [editingPlan, setEP]     = useState(null);   // {plan} for edit; {} for new
    const [creatingAdmin, setCA]   = useState(false);

    const load = useCallback(async () => {
      try {
        const baseReqs = [
          api.get('/api/admin/users?role=user'),
          api.get('/api/leads'),
          api.get('/api/admin/payments'),
          api.get('/api/admin/stats'),
          api.get('/api/admin/charts'),
          api.get('/api/admin/audit'),
          api.get('/api/admin/plans').catch(() => api.get('/api/billing/plans')),
        ];
        const [u, l, p, s, ch, au, pl, a] = await Promise.all([...baseReqs, api.get('/api/admin/admins')]);
        setUsers(u); setLeads(l); setPays(p); setStats(s); setCharts(ch); setAudit(au); setPlans(pl); setAdmins(a);
      } catch (e) { setError(e.message); }
    }, []);
    useEffect(() => { load(); }, [load]);

    const toggleUser = async (u) => {
      setBusy('u' + u.id);
      try { await api.post(`/api/admin/users/${u.id}/${u.status === 'active' ? 'suspend' : 'activate'}`, {}); load(); }
      catch (e) { setError(e.message); } finally { setBusy(''); }
    };
    const recordPayment = async (uid) => {
      const plan = planByUser[uid];
      if (!plan) { alert('Pick a plan first'); return; }
      setBusy('p' + uid);
      try { await api.post('/api/billing/manual-payment', { user_id: uid, plan_code: plan, method: 'cash/upi/bank' }); load(); }
      catch (e) { setError(e.message); } finally { setBusy(''); }
    };

    const tabBtn = (id, label) => (
      <button onClick={() => setTab(id)} style={{
        background: tab === id ? C.primary : 'transparent', color: tab === id ? '#fff' : C.muted,
        border: `1px solid ${tab === id ? C.primary : C.border}`, borderRadius: 9,
        padding: '8px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer',
        transition: 'all 0.15s',
      }}>{label}</button>
    );
    const k = ({ label, value, color, sub }) => (
      <div style={{
        background: C.card, borderRadius: 12, padding: '16px 18px', border: `1px solid ${C.border}`,
        boxShadow: `0 2px 8px rgba(0,0,0,${dark ? '0.3' : '0.04'})`,
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 800, color: color || C.text }}>{value}</div>
        {sub && <div style={{ fontSize: 11, color: C.faint, marginTop: 3 }}>{sub}</div>}
      </div>
    );

    const fmtINR = v => '₹' + Number(v || 0).toLocaleString('en-IN');
    const fmtMonthShort = ym => {
      if (!ym) return '';
      const [y, m] = ym.split('-');
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1] + " '" + y.slice(2);
    };

    return (
      <div style={{ minHeight: '100vh', background: C.bg }}>
        <Navbar title="Admin Console" user={user} onLogout={onLogout} />
        {editingLender && <LenderEditModal u={editingLender} onClose={() => setEL(null)} onSaved={load} />}
        {editingPlan && <PlanEditModal p={editingPlan.plan} onClose={() => setEP(null)} onSaved={load} />}
        {creatingAdmin && <AdminCreateModal onClose={() => setCA(false)} onSaved={load} />}

        <div className="fade-in" style={{ padding: '26px 22px', maxWidth: 1280, margin: '0 auto' }}>
          <p style={{ color: C.faint, fontSize: 13.5, marginBottom: 22 }}>
            Welcome, <strong style={{ color: C.text }}>{user.name}</strong> · {user.role.replace('_', ' ')}
          </p>

          {/* KPI cards */}
          {stats && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginBottom: 22 }}>
              {k({ label: 'Lenders',       value: stats.total_users,  color: C.primary })}
              {k({ label: 'Active Subs',   value: stats.active_subs,  color: C.success })}
              {k({ label: 'Trial Subs',    value: stats.trial_subs,   color: C.cyan })}
              {k({ label: 'Total Cases',   value: stats.total_cases,  color: C.violet })}
              {k({ label: 'Revenue (₹)',   value: Number(stats.total_revenue).toLocaleString('en-IN'),  color: C.green })}
              {k({ label: 'Signup Leads',  value: stats.pending_leads, color: C.amber })}
            </div>
          )}

          {/* Tabs */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap' }}>
            {tabBtn('overview', `📊 ${t('overview')}`)}
            {tabBtn('users',    `👥 ${t('lenders')}`)}
            {tabBtn('admins',  `🛡 ${t('admins')}`)}
            {tabBtn('plans',   `💼 ${t('plans')}`)}
            {tabBtn('leads',    `📩 ${t('signupRequests')}`)}
            {tabBtn('payments', `💳 ${t('payments')}`)}
            {tabBtn('audit',    `📜 ${t('auditLog')}`)}
            <button onClick={async () => {
              if (!confirm('Send SMS reminders to all borrowers with deadlines within 7 days or already overdue?')) return;
              try {
                const r = await api.post('/api/admin/send-reminders', {});
                alert(`Sent ${r.sent} reminders (${r.skipped} skipped, ${r.scanned} scanned).`);
                load();
              } catch (e) { alert('Failed: ' + e.message); }
            }} style={{
              background: C.amber, color: '#fff', border: 'none', borderRadius: 9,
              padding: '8px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer',
            }}>📣 Send Reminders</button>
          </div>

          {error && <Alert type="error">{error}</Alert>}

          {/* ── OVERVIEW with charts ── */}
          {tab === 'overview' && charts && (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(360px, 1fr))', gap: 16, marginBottom: 16 }}>
                <ChartBox title="📈 Monthly Revenue (last 12 months)">
                  <LineChart
                    labels={charts.monthly.map(r => fmtMonthShort(r.month))}
                    datasets={[{ label: 'Revenue', data: charts.monthly.map(r => r.revenue),
                      borderColor: C.success, backgroundColor: C.success + '28', fill: true }]}
                    yFmt={fmtAxis} height={240}
                  />
                </ChartBox>
                <ChartBox title="👥 New Signups (last 12 months)">
                  <BarChart
                    labels={charts.monthly.map(r => fmtMonthShort(r.month))}
                    datasets={[{ label: 'Signups', data: charts.monthly.map(r => r.signups),
                      backgroundColor: C.primary + 'CC', borderRadius: 6 }]}
                    height={240}
                  />
                </ChartBox>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 16, marginBottom: 16 }}>
                <ChartBox title="📊 Subscription Status">
                  <DoughnutChart
                    labels={['Trial', 'Active', 'Expired']}
                    data={[charts.status_counts.trial, charts.status_counts.active, charts.status_counts.expired]}
                    colors={[C.cyan, C.success, C.error]} height={220}
                  />
                </ChartBox>
                <ChartBox title="💼 Active Subs by Plan">
                  {Object.keys(charts.plan_counts).length === 0
                    ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No subs yet</div>
                    : <DoughnutChart
                        labels={Object.keys(charts.plan_counts)}
                        data={Object.values(charts.plan_counts)}
                        colors={CHART_PALETTE} height={220}
                      />
                  }
                </ChartBox>
                <ChartBox title="💰 Revenue by Plan">
                  {Object.keys(charts.revenue_by_plan).length === 0
                    ? <div style={{ color: C.faint, textAlign: 'center', padding: 40 }}>No revenue yet</div>
                    : <BarChart
                        labels={Object.keys(charts.revenue_by_plan)}
                        datasets={[{ label: 'Revenue', data: Object.values(charts.revenue_by_plan),
                          backgroundColor: CHART_PALETTE.map(c => c + 'CC'), borderRadius: 6 }]}
                        yFmt={fmtAxis} height={220}
                      />
                  }
                </ChartBox>
              </div>
            </>
          )}

          {/* ── LENDERS ── */}
          {tab === 'users' && (
            <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Plan</th><th>Days Left</th><th>Status</th><th>Manual Payment</th><th>Actions</th></tr></thead>
                  <tbody>
                    {users.map(u => {
                      const s = u.subscription;
                      return (
                        <tr key={u.id}>
                          <td>#{u.id}</td>
                          <td style={{ fontWeight: 600 }}>{u.name}</td>
                          <td>{u.phone || '—'}</td>
                          <td>{u.email || '—'}</td>
                          <td>{s?.plan_code || '—'}</td>
                          <td>
                            {s ? (() => {
                              const d = Math.ceil((new Date(s.expires_at) - new Date()) / 86400000);
                              return <span style={{ color: d < 0 ? C.error : (d < 4 ? C.amber : C.success), fontWeight: 700 }}>{d}d</span>;
                            })() : '—'}
                          </td>
                          <td>
                            <span style={{ padding:'2px 9px', borderRadius:14, fontSize:11, fontWeight:700,
                              background: u.status === 'active' ? C.successLight : C.errorLight,
                              color: u.status === 'active' ? C.success : C.error }}>{u.status.toUpperCase()}</span>
                          </td>
                          <td>
                            <div style={{ display: 'flex', gap: 6 }}>
                              <select value={planByUser[u.id] || ''} onChange={e => setPbU(m => ({ ...m, [u.id]: e.target.value }))} style={{
                                background: C.inputBg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 7, padding: '5px 8px', fontSize: 12.5,
                              }}>
                                <option value="">— plan —</option>
                                {plans.filter(p => !p.is_trial && p.active).map(p => <option key={p.code} value={p.code}>{p.name} ₹{p.price_inr}</option>)}
                              </select>
                              <Btn onClick={() => recordPayment(u.id)} loading={busy === 'p' + u.id} style={{ padding: '6px 10px', fontSize: 12 }}>Record</Btn>
                            </div>
                          </td>
                          <td>
                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                              <Btn variant="secondary" onClick={() => setEL(u)} style={{ padding: '6px 10px', fontSize: 12 }}>Edit</Btn>
                              <select onChange={async e => {
                                const s = e.target.value; if (!s) return;
                                try { await api.post(`/api/admin/users/${u.id}/kyc`, { status: s }); load(); }
                                catch (err) { alert(err.message); }
                                e.target.value = '';
                              }} style={{
                                background: C.inputBg, color: C.text, border: `1px solid ${C.border}`, borderRadius: 7, padding: '4px 8px', fontSize: 12,
                              }}>
                                <option value="">KYC…</option>
                                <option value="verified">Mark Verified</option>
                                <option value="pending">Mark Pending</option>
                                <option value="rejected">Mark Rejected</option>

  function AddCasePage({ onBack, isExisting, user, onProfile }) {
    const { C } = useTheme();
    const { t } = useLang();
    const { rate: goldRate } = useGoldRate();
    const [borrowerCases, setBorrowerCases] = useState([]);
    const blank = () => ({
      name: '', father_name: '', address: '', mobile: '', items: '', weight: '', metal: 'Gold',
      money_lent: '', interest_rate: '',
      loan_date: isExisting ? '' : todayStr(),
      loan_time: isExisting ? '' : nowTime(),
      notes: '',
      probable_close_date: '', hard_deadline: '',
      address_proof: '', lending_video: '',
    });
    const [form, setForm]       = useState(blank());
    const [loading, setLoading] = useState(false);
    const [success, setSuccess] = useState(null);
    const [error, setError]     = useState('');
    const set  = k => e => { setForm(f => ({ ...f, [k]: e.target.value })); setError(''); };
    const setF = k => v  => { setForm(f => ({ ...f, [k]: v })); };          // for file fields
    const submit = async e => {
      e.preventDefault();
      if (!form.name.trim()) { setError('Borrower name is required.'); return; }
      setLoading(true); setError('');
      try {
        const res = await api.post('/api/cases', form);
        setSuccess(res.id); setForm(blank());
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) { setError(err.message || 'Failed to save.'); }
      finally { setLoading(false); }
    };
    const g2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 };
    const g3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 };

    // Hard-deadline overdue warning
    const hdPast = form.hard_deadline && new Date(form.hard_deadline) < new Date();

    return (
      <div style={{ minHeight: '100vh', background: C.bg, transition: 'background-color 0.3s' }}>
        <Navbar title={isExisting ? 'Add Existing Case' : 'Add New Case'} onBack={onBack} user={user} onProfile={onProfile} />
        <div className="fade-in" style={{ padding: '28px 20px', maxWidth: 800, margin: '0 auto' }}>
          {/* Live gold rate ticker — visible aid when adding a new gold loan */}
          {!isExisting && goldRate && (
            <div style={{ marginBottom: 16 }}><GoldRateBar /></div>
          )}
          {isExisting && <div style={{ marginBottom: 16 }}><Alert type="info">📂 Entering an existing record — fill in the original loan date &amp; time manually.</Alert></div>}
          {success && (
            <div style={{ marginBottom: 16 }}>
              <Alert type="success">✅ Case <strong>#{success}</strong> saved!{' '}
                <span style={{ textDecoration: 'underline', cursor: 'pointer' }} onClick={() => setSuccess(null)}>Add another →</span>
              </Alert>
            </div>
          )}
          <Card>
            <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>

              {/* ── Borrower Details ─────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('borrowerDetails')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('borrowerName')} required value={form.name} onChange={set('name')} placeholder="Full name" autoFocus />
                    <Input label={t('fatherName')} value={form.father_name} onChange={set('father_name')} placeholder="Father's full name" />
                  </div>
                  <div style={g2}>
                    <Input label={t('mobileNumber')} type="tel" value={form.mobile}
                      onChange={e => {
                        const v = e.target.value;
                        setForm(f => ({ ...f, mobile: v })); setError('');
                        if (v && v.length >= 10) {
                          api.get(`/api/borrowers/${encodeURIComponent(v)}/cases`).then(setBorrowerCases).catch(() => setBorrowerCases([]));
                        } else { setBorrowerCases([]); }
                      }}
                      placeholder="e.g. 9876543210" />
                    <div />
                  </div>
                  <Textarea label={t('address')} value={form.address} onChange={set('address')} rows={2} placeholder="Full address..." />
                  <FileUpload
                    label={`${t('addressProof')} (Aadhaar / PAN / Passport)`}
                    accept="image/*"
                    value={form.address_proof}
                    onChange={setF('address_proof')}
                  />
                </div>
              </div>

              {/* ── Pledged Item ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('pledgedItem')}</SectionTitle>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <Input label={t('items')} value={form.items} onChange={set('items')} placeholder="e.g. Gold necklace, 2 bangles, silver anklets" />
                  <div style={g3}>
                    <Input label={t('weight')} type="number" step="0.01" min="0" value={form.weight} onChange={set('weight')} placeholder="e.g. 10.5" />
                    <div style={{ gridColumn: 'span 2' }}>
                      <Select label={t('metalType')} value={form.metal} onChange={set('metal')}>
                        {METALS.map(m => <option key={m} value={m}>{m}</option>)}
                      </Select>
                    </div>
                  </div>
                </div>
              </div>

              {/* Existing-borrower hint */}
              {borrowerCases.length > 0 && (
                <div style={{
                  background: C.infoBg, border: `1px solid ${C.infoBorder}`, color: C.infoColor,
                  borderRadius: 10, padding: '10px 14px', fontSize: 13,
                }}>
                  ℹ️ <strong>{borrowerCases[0].name}</strong> has borrowed <strong>{borrowerCases.length}</strong> time{borrowerCases.length === 1 ? '' : 's'} before.
                  Total lent: ₹{borrowerCases.reduce((s, c) => s + (c.money_lent || 0), 0).toLocaleString('en-IN')}.
                  ({borrowerCases.filter(c => c.status === 'open').length} open · {borrowerCases.filter(c => c.status === 'closed').length} closed · {borrowerCases.filter(c => c.status === 'bad_debt').length} bad debt)
                </div>
              )}

              {/* ── Loan Details ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('loanDetails')}</SectionTitle>
                {/* Suggested loan amount (gold only, 75% LTV) */}
                {goldRate && form.metal === 'Gold' && parseFloat(form.weight) > 0 && (() => {
                  const w = parseFloat(form.weight);
                  const r22 = goldRate.rate_22k_per_gram_inr || 0;
                  const value22 = w * r22;
                  const suggested = Math.round(value22 * 0.75 / 100) * 100;     // round to ₹100
                  const apply = () => setForm(f => ({ ...f, money_lent: suggested.toString() }));
                  return (
                    <div style={{
                      background: C.amberLight, border: `1px solid ${C.amberBorder}`,
                      borderRadius: 10, padding: '10px 14px', marginBottom: 14,
                      display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap',
                    }}>
                      <div style={{ fontSize: 13, color: C.text }}>
                        💡 <strong>Suggested loan:</strong>
                        <span style={{ color: C.amber, fontWeight: 800, marginLeft: 6 }}>₹{suggested.toLocaleString('en-IN')}</span>
                        <span style={{ fontSize: 11.5, color: C.muted, marginLeft: 8 }}>
                          ({w}g × ₹{Math.round(r22).toLocaleString('en-IN')}/g × 75% LTV)
                        </span>
                      </div>
                      <button type="button" onClick={apply} style={{
                        background: C.amber, color: '#fff', border: 'none',
                        borderRadius: 7, padding: '6px 12px', fontSize: 12, fontWeight: 700, cursor: 'pointer',
                      }}>Use this</button>
                    </div>
                  );
                })()}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                  <div style={g2}>
                    <Input label={t('amountLent')} type="number" step="0.01" min="0" value={form.money_lent} onChange={set('money_lent')} placeholder="e.g. 50000" />
                    <Input label={t('interestRate')} type="number" step="0.01" min="0" value={form.interest_rate} onChange={set('interest_rate')} placeholder="e.g. 2" />
                  </div>
                  <div style={g2}>
                    <Input label={isExisting ? 'Original Loan Date' : 'Date'} type="date" value={form.loan_date} onChange={set('loan_date')} required={isExisting} />
                    <Input label={isExisting ? 'Original Loan Time' : 'Time'} type="time" value={form.loan_time} onChange={set('loan_time')} />
                  </div>
                  <div style={g2}>
                    <Input label={t('probableClose')} type="month" value={form.probable_close_date} onChange={set('probable_close_date')} />
                    <div>
                      <Input
                        label={t('hardDeadline')}
                        type="date"
                        value={form.hard_deadline}
                        onChange={set('hard_deadline')}
                        style={hdPast ? { borderColor: C.error } : {}}
                      />
                      {hdPast && <div style={{ fontSize: 11, color: C.error, marginTop: 4 }}>⚠️ This date is already past!</div>}
                    </div>
                  </div>
                  <Textarea label={t('notes')} value={form.notes} onChange={set('notes')} rows={3} placeholder="Any additional notes..." />
                </div>
              </div>

              {/* ── Lending Proof ─────────────────────────────────────────── */}
              <div>
                <SectionTitle>{t('lendingProofVid')}</SectionTitle>
                <FileUpload
                  label="Upload video of borrower receiving the loan (optional)"
                  accept="video/*"
                  value={form.lending_video}
                  onChange={setF('lending_video')}
                  maxMB={25}
                />
              </div>

              {error && <Alert type="error">{error}</Alert>}
              <div style={{ display: 'flex', gap: 12, justifyContent: 'flex-end', paddingTop: 4 }}>
                <Btn type="button" variant="secondary" onClick={onBack}>{t('cancel')}</Btn>
                <Btn type="submit" loading={loading}>💾 {t('saveCase')}</Btn>
              </div>
            </form>
          </Card>
        </div>
      </div>
    );
  }
